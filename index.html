  padding-left: calc(.9rem - 3px); 
  font-weight: 600; 
}

.wa-slink { color: var(--c2) !important; }
.admin-slink { color: var(--c1) !important; }
.admin2-slink { color: var(--c5) !important; }

.logout-slink { 
  color: var(--danger) !important; 
  margin-top: 1rem;
  border-top: 3px solid var(--border); 
  padding-top: 1rem; 
}

.slink-group-label { 
  font-size: .65rem; 
  letter-spacing: 2px;
  text-transform: uppercase; 
  color: var(--muted); 
  padding: .8rem .9rem .3rem; 
  font-weight: 700; 
}

/* ================================================================
   BOTON PDF GLOBAL
   ================================================================ */
.btn-pdf-global {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  padding: .5rem 1rem;
  background: var(--c1);
  border: 3px solid var(--c1);
  border-radius: 10px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: .78rem;
  font-weight: 700;
  cursor: pointer;
  transition: .2s;
  text-transform: uppercase;
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3);
  position: relative;
  overflow: hidden;
}

.btn-pdf-global::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 40%;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 7px 7px 0 0;
  pointer-events: none;
}

.btn-pdf-global:hover { 
  transform: translate(-2px, -2px);
  box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.4);
}

/* ================================================================
   PANTALLA FASE BLOQUEADA
   ================================================================ */
.phase-locked-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 5rem 2rem;
}

.pls-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.5; }

.pls-title { 
  font-family: 'Syne', sans-serif; 
  font-size: 1.4rem;
  font-weight: 800; 
  color: var(--text2); 
  margin-bottom: .5rem;
  text-transform: uppercase; 
}

.pls-msg { color: var(--muted); font-size: .88rem; line-height: 1.6; max-width: 320px; }

/* ================================================================
   CONTENEDOR PRINCIPAL CORE
   ================================================================ */
.page-wrap { 
  display: flex; 
  flex-direction: column; 
  gap: 1.5rem;
  animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
}

@keyframes fadeUp { 
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: none; } 
}

.page-header { 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  flex-wrap: wrap; 
  gap: 1rem; 
}

.page-title { 
  font-family: 'Syne', sans-serif; 
  font-size: 1.6rem;
  font-weight: 800; 
  color: var(--text); 
  text-transform: uppercase;
  letter-spacing: -0.5px; 
}

.btn-back {
  padding: .55rem 1.1rem;
  background: var(--bg3);
  border: 3px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  transition: .2s;
  box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
}

.btn-back:hover { 
  border-color: var(--text2); 
  background: rgba(255,255,255,0.05); 
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3);
}

.btn-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--bg3);
  border: 3px solid var(--border);
  cursor: pointer;
  color: var(--text);
  transition: .2s;
  box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
}

.btn-icon:hover { 
  border-color: var(--c1); 
  color: var(--c1); 
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3);
}

.btn-sm {
  padding: .5rem 1rem;
  background: var(--bg3);
  border: 3px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: .83rem;
  transition: .2s;
  box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
}

.btn-sm:hover { 
  background: rgba(255,255,255,0.06); 
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3);
}

.btn-sm.btn-ok { border-color: var(--success); color: var(--success); }
.btn-sm.btn-danger { border-color: var(--danger); color: var(--danger); }

/* ================================================================
   CONTENEDORES Y TARJETAS
   ================================================================ */
.card {
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 20px;
  padding: 1.5rem;
  box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.3);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 35%;
  background: rgba(255, 255, 255, 0.02);
  border-radius: 17px 17px 0 0;
  pointer-events: none;
}

.card-title {
  font-family: 'Syne', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 1rem;
}

.divider { border: none; border-top: 3px solid var(--border); margin: 1.25rem 0; }

.center-card { text-align: center; padding: 4rem 2rem; }

/* ================================================================
   HERO CARD
   ================================================================ */
.hero-card {
  background: var(--bg2);
  border: 3px solid var(--border);
  border-radius: 20px;
  padding: 2.5rem 2rem;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.hero-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--c1), var(--c5), transparent);
}

.hero-bg-text {
  position: absolute;
  right: -10px;
  bottom: -30px;
  font-family: 'Syne', sans-serif;
  font-size: 10rem;
  font-weight: 900;
  color: rgba(255, 255, 255, 0.012);
  line-height: 1;
  pointer-events: none;
  user-select: none;
}

.hero-content { position: relative; z-index: 1; }

.hero-sub { 
  color: var(--c5); 
  font-size: .7rem; 
  letter-spacing: 4px;
  text-transform: uppercase; 
  margin-bottom: .5rem; 
  font-weight: 700; 
}

.hero-name { 
  font-family: 'Syne', sans-serif; 
  font-size: 2.2rem;
  font-weight: 800; 
  color: #fff; 
  margin-bottom: .25rem; 
  letter-spacing: -0.5px; 
}

.hero-tagline { 
  color: var(--text2); 
  margin-bottom: 1.5rem; 
  font-size: .88rem; 
  font-style: normal; 
  opacity: 0.8; 
}

.hero-btns { display: flex; gap: .75rem; flex-wrap: wrap; }

.hero-btns .btn-main { width: auto; padding: .75rem 2rem; }

.ann-bar {
  background: rgba(253, 203, 110, 0.08);
  border: 3px solid rgba(253, 203, 110, 0.3);
  color: var(--c5);
  padding: .7rem 1.2rem;
  border-radius: 12px;
  font-weight: 500;
  font-size: .85rem;
  text-align: center;
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.2);
}

/* ================================================================
   CASILLAS Y GRILLAS
   ================================================================ */
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin-bottom: 1rem; }

.quick-btn {
  padding: .8rem;
  background: var(--bg3);
  border: 3px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  transition: .2s;
  box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
}

.quick-btn:hover { 
  border-color: var(--c1); 
  background: rgba(108, 92, 231, 0.05); 
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3);
}

/* ================================================================
   GRILLAS DE FASES
   ================================================================ */
.phases-list { display: flex; flex-direction: column; gap: .6rem; }

.phase-card {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 14px;
  padding: 1rem 1.25rem;
  transition: all 0.2s ease;
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.2);
  position: relative;
  overflow: hidden;
}

.phase-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 35%;
  background: rgba(255, 255, 255, 0.02);
  border-radius: 11px 11px 0 0;
  pointer-events: none;
}

.phase-card:not(.phase-locked):hover {
  border-color: var(--c1);
  background: rgba(108, 92, 231, 0.05);
  transform: translate(-3px, -3px);
  box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.3);
}

.phase-locked { opacity: .35; filter: grayscale(0.5); }
.phase-done { border-color: rgba(0, 184, 148, 0.3); background: rgba(0, 184, 148, 0.03); }
.phase-partial { border-color: rgba(255, 255, 255, 0.15); }

.phase-icon { font-size: 1.3rem; width: 30px; text-align: center; }

.phase-info { flex: 1; }

.phase-label { 
  font-family: 'Syne', sans-serif; 
  font-weight: 700;
  font-size: .92rem; 
  color: var(--text); 
}

.phase-progress { color: var(--text2); font-size: .78rem; margin-top: .15rem; }

.phase-arrow { color: var(--c1); font-size: 1.1rem; opacity: 0.7; }

.group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: .6rem; }

.group-tile {
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 14px;
  padding: 1rem .5rem;
  cursor: pointer;
  transition: .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .25rem;
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.2);
}

.group-tile:hover {
  border-color: var(--c1);
  background: rgba(108, 92, 231, 0.05);
  transform: translate(-2px, -2px);
  box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.3);
}

.group-tile-done { border-color: rgba(0, 184, 148, 0.3); background: rgba(0, 184, 148, 0.03); }

.gt-label { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--text); }
.gt-count { font-size: .75rem; color: var(--text2); }

/* ================================================================
   TABLERO DE PARTIDOS
   ================================================================ */
.matches-v2 { display: flex; flex-direction: column; gap: .65rem; }

.match-card-v2 {
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 14px;
  padding: 1.1rem 1.25rem;
  transition: border-color 0.2s ease;
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.2);
  position: relative;
  overflow: hidden;
}

.match-card-v2::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 35%;
  background: rgba(255, 255, 255, 0.02);
  border-radius: 11px 11px 0 0;
  pointer-events: none;
}

.match-card-v2:hover { border-color: rgba(255, 255, 255, 0.15); }
.match-card-v2.mc-done { border-color: rgba(0, 184, 148, 0.2); }

.mc-elim-label {
  font-size: .65rem;
  color: var(--c1);
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: .5rem;
  opacity: 0.8;
}

.mc-teams {
  display: flex;
  align-items: center;
  gap: .75rem;
  font-weight: 500;
  font-size: .95rem;
  flex-wrap: wrap;
  color: var(--text);
}

.mc-vs { color: var(--muted); font-size: .75rem; font-weight: 400; text-transform: uppercase; }
.mc-date { color: var(--text2); font-size: .75rem; margin: .4rem 0; font-weight: 400; }

/* ================================================================
   ENTRADAS DE MARCADORES
   ================================================================ */
.score-inputs { display: flex; align-items: center; gap: .4rem; }

.sinp {
  width: 50px;
  padding: .5rem 0;
  background: var(--bg3);
  border: 3px solid var(--border);
  border-radius: 10px;
  color: #fff;
  font-size: 1.1rem;
  text-align: center;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  outline: none;
  transition: all 0.2s ease;
  box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
}

.sinp:focus {
  border-color: var(--c1);
  background: rgba(108, 92, 231, 0.05);
  box-shadow: 0 0 15px rgba(108, 92, 231, 0.15), 2px 2px 0px rgba(0, 0, 0, 0.2);
}

.sinp-sep { color: var(--muted); font-size: .85rem; font-weight: 400; }
.sinp-sm { width: 42px; padding: .35rem 0; font-size: .95rem; }

.pred-result { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }

.pred-score-v2 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); }

/* ================================================================
   BADGES DE PUNTOS
   ================================================================ */
.pts-badge { 
  padding: .3rem .7rem; 
  border-radius: 8px; 
  font-size: .72rem; 
  font-weight: 700; 
  font-family: 'Syne', sans-serif;
  text-transform: uppercase; 
  box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.3);
}

.pts-badge.pts-3 { 
  background: rgba(0, 184, 148, 0.15); 
  color: var(--success); 
  border: 2px solid rgba(0, 184, 148, 0.3); 
}

.pts-badge.pts-1 { 
  background: rgba(253, 203, 110, 0.15); 
  color: var(--warn); 
  border: 2px solid rgba(253, 203, 110, 0.3); 
}

.pts-badge.pts-0 { 
  background: rgba(232, 67, 147, 0.1); 
  color: var(--danger); 
  border: 2px solid rgba(232, 67, 147, 0.2); 
}

.off-score { color: var(--text2); font-size: .78rem; font-style: normal; opacity: 0.6; }
.locked-badge { color: var(--muted); font-size: .82rem; padding: .35rem 0; }

.btn-save-all {
  width: 100%;
  padding: .9rem;
  background: var(--c1);
  border: 3px solid var(--c1);
  border-radius: 12px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: .9rem;
  cursor: pointer;
  margin-top: .75rem;
  transition: .25s;
  letter-spacing: .5px;
  text-transform: uppercase;
  box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.3);
  position: relative;
  overflow: hidden;
}

.btn-save-all::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 40%;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 9px 9px 0 0;
  pointer-events: none;
}

.btn-save-all:hover {
  transform: translate(-2px, -2px);
  box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.4);
  filter: brightness(1.1);
}

/* ================================================================
   TABLA DE POSICIONES
   ================================================================ */
.tabla-wrap { padding: 0.5rem 0; }

.tabla-tabs { 
  display: flex; 
  gap: .3rem; 
  margin-bottom: 1.25rem;
  background: var(--bg3); 
  padding: .3rem; 
  border-radius: 12px;
  width: fit-content; 
  border: 3px solid var(--border); 
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.2);
}

.ttab {
  padding: .5rem 1.1rem;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text2);
  font-family: 'Syne', sans-serif;
  font-size: .8rem;
  font-weight: 700;
  cursor: pointer;
  transition: .2s;
  text-transform: uppercase;
}

.ttab.active { background: var(--c1); color: #fff; box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.3); }

.tabla-card-title {
  font-family: 'Syne', sans-serif;
  font-size: .9rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: .75rem;
  padding: .5rem .75rem;
  background: var(--bg3);
  border-radius: 10px;
  border-left: 4px solid var(--c1);
  text-transform: uppercase;
  box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
}

.tabla-scroll { overflow-x: auto; border-radius: 12px; border: 3px solid var(--border); }

.tabla-v2 { width: 100%; border-collapse: collapse; background: transparent; font-size: .88rem; }

.tabla-v2 thead { background: var(--bg3); border-bottom: 3px solid var(--border); }

.tabla-v2 th { 
  padding: .75rem .6rem; 
  font-size: .75rem; 
  color: var(--c1); 
  font-family: 'Syne', sans-serif; 
  font-weight: 700;
  text-align: left; 
  text-transform: uppercase; 
}

.th-sticky { position: sticky; background: var(--bg); z-index: 2; }
.th-sticky:first-child { left: 0; }
.th-sticky.th-name { left: 35px; min-width: 120px; }
.th-sticky:nth-child(3) { left: 155px; }

.tabla-v2 td { padding: .75rem .5rem; border-top: 3px solid var(--border); vertical-align: middle; }

.td-pos { 
  text-align: center; 
  width: 35px; 
  font-family: 'Syne', sans-serif;
  font-weight: 700; 
  color: var(--text2); 
}

.td-name { 
  font-weight: 500; 
  min-width: 120px; 
  position: sticky; 
  left: 35px; 
  background: var(--bg); 
  z-index: 1; 
  color: var(--text); 
}

.td-pts { 
  font-family: 'Syne', sans-serif; 
  font-size: 1rem;
  font-weight: 800; 
  color: var(--c1); 
  text-align: center; 
  width: 40px;
  position: sticky; 
  left: 155px; 
  background: var(--bg); 
  z-index: 1; 
}

.tr-top-0 td { background: rgba(108, 92, 231, 0.05); }
.tr-top-1 td { background: rgba(255, 255, 255, 0.02); }

.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 2px; }
.dot-exact { background: var(--success); box-shadow: 0 0 8px var(--success); }
.dot-winner { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
.dot-miss { background: var(--danger); }
.dot-pending { background: rgba(255,255,255,0.1); }

/* ================================================================
   PROBABILIDADES Y ESTADISTICAS
   ================================================================ */
.prob-match { padding: 1rem 0; border-bottom: 3px solid var(--border); }
.prob-match:last-child { border-bottom: none; }

.prob-teams { font-weight: 600; font-size: .9rem; color: var(--text); margin-bottom: .25rem; }

.prob-bars { display: flex; flex-direction: column; gap: .4rem; margin-top: .5rem; }

.prob-bar-wrap { display: flex; align-items: center; gap: .6rem; }

.prob-label { font-size: .78rem; color: var(--text2); width: 75px; flex-shrink: 0; }

.prob-bar { 
  flex: 1; 
  height: 10px; 
  background: var(--bg3); 
  border-radius: 10px; 
  overflow: hidden; 
  border: 2px solid var(--border);
}

.prob-fill { 
  height: 100%; 
  border-radius: 8px; 
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
  box-shadow: inset 0 -2px 0px rgba(0,0,0,0.2);
}

.prob-home { background: var(--c1); }
.prob-draw { background: var(--muted); }
.prob-away { background: var(--c2); }

.prob-pct { 
  font-family: 'Syne', sans-serif; 
  font-size: .78rem;
  font-weight: 700; 
  color: var(--text); 
  width: 35px; 
  text-align: right; 
}

/* ================================================================
   DASHBOARD ESTADISTICO
   ================================================================ */
.stats-hero-card {
  background: var(--bg2);
  border: 3px solid var(--border);
  border-radius: 18px;
  padding: 1.5rem;
  box-shadow: var(--shadow);
}

.shc-name { 
  font-family: 'Syne', sans-serif; 
  font-weight: 700;
  margin-bottom: 1.25rem; 
  color: var(--c1); 
  text-transform: uppercase;
  font-size: .9rem; 
}

.shc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

@media(min-width:480px){ .shc-grid { grid-template-columns: repeat(6, 1fr); } }

.shc-stat { text-align: center; }

.shc-val { 
  display: block; 
  font-family: 'Syne', sans-serif; 
  font-size: 1.5rem; 
  font-weight: 800; 
  color: #fff; 
}

.shc-lbl { 
  font-size: .65rem; 
  color: var(--text2); 
  text-transform: uppercase;
  letter-spacing: 0.5px; 
  margin-top: .2rem; 
}

/* ================================================================
   REGLAMENTO VISUAL
   ================================================================ */
.rules-list { display: flex; flex-direction: column; gap: .6rem; }

.rule-v2 { 
  display: flex; 
  gap: 1rem; 
  background: var(--card); 
  border: 3px solid var(--border); 
  border-radius: 14px; 
  padding: 1.1rem; 
  box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.2);
}

.rule-v2 h4 { 
  font-family: 'Syne', sans-serif; 
  font-weight: 700;
  margin-bottom: .2rem; 
  font-size: .9rem; 
  text-transform: uppercase; 
}

.rule-v2 p { color: var(--text2); font-size: .83rem; line-height: 1.5; }

/* ================================================================
   MODAL PENALES FLOTANTE
   ================================================================ */
.penal-overlay {
  position: fixed; inset: 0; background: rgba(26, 26, 46, 0.9);
  backdrop-filter: blur(10px); z-index: 9000;
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}

.penal-modal {
  background: var(--bg2); 
  border: 3px solid var(--border);
  border-radius: 20px; 
  padding: 2rem; 
  width: 100%; 
  max-width: 380px;
  box-shadow: var(--shadow);
