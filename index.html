        ];

        /* ==========================================
           LÓGICA INTERNA (NO TOCAR SI NO ERES EXPERTO)
           ========================================== 
        */

        let misVotos = JSON.parse(localStorage.getItem('quiniela_v2_data')) || {};

        function verificarCierre() {
            const limite = new Date(FECHA_CIERRE_MAESTRA);
            const ahora = new Date();
            const estaCerrado = ahora >= limite;
            
            const relojEl = document.getElementById('reloj-cierre');
            if(estaCerrado) {
                relojEl.innerHTML = `<span class="text-red-500"><i class="fas fa-lock mr-1"></i> MERCADO CERRADO</span>`;
            } else {
                relojEl.innerHTML = `<span class="text-blue-400 italic">Cierra: ${FECHA_CIERRE_MAESTRA}</span>`;
            }
            return estaCerrado;
        }

        function guardar(id, equipo, valor) {
            if (!misVotos[id]) misVotos[id] = { l: 0, v: 0 };
            misVotos[id][equipo] = parseInt(valor) || 0;
            localStorage.setItem('quiniela_v2_data', JSON.stringify(misVotos));
            calcularPuntos();
            actualizarUI();
        }

        function calcularPuntos() {
            let total = 0;
            partidos.forEach(p => {
                const v = misVotos[p.id];
                if (v && p.realL !== null) {
                    if (v.l === p.realL && v.v === p.realV) {
                        total += 3; // Marcador exacto
                    } else if (Math.sign(v.l - v.v) === Math.sign(p.realL - p.realV)) {
                        total += 1; // Solo tendencia
                    }
                }
            });
            document.getElementById('puntos-usuario').innerText = total;
        }

                const v = misVotos[p.id] || { l: 0, v: 0 };

            });
            const pts = document.getElementById('puntos-usuario').innerText;
            texto += `\n🔥 Puntos hasta ahora: *${pts}*`;
            
            window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
        }
