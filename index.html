const Utils = {
  getFlag: (team) => CONFIG.FLAGS[team] || "⚽",
  
  formatDate: (dateStr) => {
    const d = new Date(dateStr);
    return d.toLocaleDateString('es-GT', { day: 'numeric', month: 'short' });
  },
  
  showToast: (msg, type = "info") => {
    const container = document.getElementById("toast-container");
    if (!container) return;
    const t = document.createElement("div");
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    container.appendChild(t);
    requestAnimationFrame(() => t.classList.add("show"));
    setTimeout(() => {
      t.classList.remove("show");
      setTimeout(() => t.remove(), 400);
    }, 3500);
  },
  
  calcPoints: (pred, official) => {
    if (!official || official.home === null || official.home === undefined) return null;
    const ph = Number(pred.home), pa = Number(pred.away);
    const oh = Number(official.home), oa = Number(official.away);
    if (isNaN(ph) || isNaN(pa) || isNaN(oh) || isNaN(oa)) return 0;
    if (ph === oh && pa === oa) return 3;
    const pw = ph > pa ? "h" : ph < pa ? "a" : "d";
    const ow = oh > oa ? "h" : oh < oa ? "a" : "d";
    return pw === ow ? 1 : 0;
  },
  
  calcPointsElim: (pred, official) => {
    if (!official || official.home === null || official.home === undefined) return null;
    const ph = Number(pred.home), pa = Number(pred.away);
    const oh = Number(official.home), oa = Number(official.away);
    if (isNaN(ph) || isNaN(pa) || isNaN(oh) || isNaN(oa)) return 0;
    let pts = 0;
    const isExact = (ph === oh && pa === oa);
    const pw = ph > pa ? "h" : ph < pa ? "a" : "d";
    const ow = oh > oa ? "h" : oh < oa ? "a" : "d";
    if (isExact) pts = 3;
    else if (pw === ow) pts = 1;
    if (ow === "d" && pw === "d" && official.penaltyWinner && pred.penaltyWinner) {
      if (pred.penaltyWinner === official.penaltyWinner) pts += 1;
    }
    return pts;
  }
};

// ═════════════════════════════════════════════════════════════════
//  MÓDULO: NAVEGACIÓN (Router SPA con History API)
// ═════════════════════════════════════════════════════════════════
const Router = {
  routes: {},
  currentRoute: null,
  
  init() {
    // Manejar navegación con botón atrás/adelante del navegador
    window.addEventListener('popstate', (e) => {
      const route = e.state?.route || 'inicio';
      const params = e.state?.params || {};
      this.navigate(route, params, false);
    });
    
    // Manejar clicks en enlaces
    document.addEventListener('click', (e) => {
      const link = e.target.closest('[data-route]');
      if (link) {
        e.preventDefault();
        const route = link.dataset.route;
        const params = link.dataset.params ? JSON.parse(link.dataset.params) : {};
        this.navigate(route, params);
      }
    });
  },
  
  register(route, handler) {
    this.routes[route] = handler;
  },
  
  navigate(route, params = {}, pushState = true) {
    if (!this.routes[route]) {
      console.error(`Ruta no encontrada: ${route}`);
      return;
    }
    
    this.currentRoute = { route, params };
    
    if (pushState) {
      const url = params.group ? `#${route}/${params.group}` : 
                  params.phase ? `#${route}/${params.phase}` : 
                  `#${route}`;
      history.pushState({ route, params }, '', url);
    }
    
    // Actualizar UI activa en sidebar
    this.updateActiveLink(route, params);
    
    // Ejecutar handler de la ruta
    this.routes[route](params);
    
    // Cerrar sidebar en móvil
    Sidebar.close();
    
    // Scroll al inicio
    window.scrollTo(0, 0);
  },
  
  updateActiveLink(route, params) {
    document.querySelectorAll('.slink').forEach(el => el.classList.remove('active'));
    
    // Mapear rutas a IDs de sidebar
    const routeMap = {
      'inicio': 'sl-inicio',
      'pronos': 'sl-pronos',
      'grupo': 'sl-pronos',
      'r32': 'sl-r32',
      'r16': 'sl-r16',
      'qf': 'sl-qf',
      'sf': 'sl-sf',
      'tf': 'sl-tf',
      'final': 'sl-final',
      'tabla': 'sl-tabla',
      'stats': 'sl-stats',
      'probs': 'sl-probs',
      'reglas': 'sl-reglas',
      'admin': 'sl-admin',
      'admin2': 'sl-admin2'
    };
    
    const id = routeMap[route];
    if (id) {
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    }
  },
  
  goBack() {
    history.back();
  }
};

import { getFirestore, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, collection, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const FirebaseService = {
  db,
  auth,
  
  // Auth
  async register(email, password, userData) {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, "users", cred.user.uid), {
      ...userData,
      uid: cred.user.uid,
      createdAt: serverTimestamp()
    });
    return cred.user;
  },
  
  async login(email, password) {
    return signInWithEmailAndPassword(auth, email, password);
  },
  
  async logout() {
    return signOut(auth);
  },
  
  onAuthChanged(callback) {
    return onAuthStateChanged(auth, callback);
  },
  
  // Matches
  async initMatches() {
    const snap = await getDoc(doc(db, "settings", "matchesInit"));
    if (snap.exists()) return;
    
    const allMatches = DataModule.getAllMatches();
    await Promise.all(allMatches.map(m => setDoc(doc(db, "matches", m.id), m)));
    await setDoc(doc(db, "settings", "matchesInit"), { done: true, ts: serverTimestamp() });
  },
  
  async getMatches() {
    const snap = await getDocs(collection(db, "matches"));
    return snap.docs.map(d => d.data()).sort((a, b) => 
      a.date.localeCompare(b.date) || a.time.localeCompare(b.time)
    );
  },
  
  subscribeToMatches(callback) {
    return onSnapshot(collection(db, "matches"), (snap) => {
      const matches = snap.docs.map(d => d.data()).sort((a, b) => 
        a.date.localeCompare(b.date) || a.time.localeCompare(b.time)
      );
      callback(matches);
    });
  },
  
  async updateMatch(id, data) {
    return updateDoc(doc(db, "matches", id), data);
  },
  
  // Predictions
  async getPrediction(uid) {
    const snap = await getDoc(doc(db, "predictions", uid));
    return snap.exists() ? snap.data().preds || {} : {};
  },
  
  async savePrediction(uid, preds) {
    return setDoc(doc(db, "predictions", uid), { uid, preds }, { merge: true });
  },
  
  subscribeToPredictions(callback) {
    return onSnapshot(collection(db, "predictions"), (snap) => {
      const preds = {};
      snap.docs.forEach(d => { preds[d.id] = d.data(); });
      callback(preds);
    });
  },
  
  // Users
  async getUser(uid) {
    const snap = await getDoc(doc(db, "users", uid));
    return snap.exists() ? snap.data() : null;
  },
  
  async updateUser(uid, data) {
    return updateDoc(doc(db, "users", uid), data);
  },
  
  async getAllUsers() {
    const snap = await getDocs(collection(db, "users"));
    const users = [];
    snap.forEach(d => users.push(d.data()));
    return users;
  },
  
  // Settings
  async getSettings() {
    const snap = await getDoc(doc(db, "settings", "site"));
    return snap.exists() ? snap.data() : null;
  },
  
  async saveSettings(settings) {
    return setDoc(doc(db, "settings", "site"), settings);
  },
  
  subscribeToSettings(callback) {
    return onSnapshot(doc(db, "settings", "site"), (snap) => {
      callback(snap.exists() ? snap.data() : {});
    });
  },
  
  // Access Codes
  async getAccessCode(code) {
    return getDoc(doc(db, "accessCodes", code));
  },
  
  async useAccessCode(code, userData) {
    return updateDoc(doc(db, "accessCodes", code), {
      used: true,
      usedBy: userData.displayName || "",
      usedAt: serverTimestamp()
    });
  },
  
  async generateAccessCodes(count) {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    const codes = [];
    for (let i = 0; i < count; i++) {
      let c = "";
      for (let j = 0; j < 6; j++) c += chars[Math.floor(Math.random() * chars.length)];
      const s = await getDoc(doc(db, "accessCodes", c));
      if (!s.exists()) {
        await setDoc(doc(db, "accessCodes", c), { used: false, createdAt: serverTimestamp() });
        codes.push(c);
      }
    }
    return codes;
  }
};

  // ═════════════════════════════════════════════════════════════════
  //  VISTA: PRONÓSTICOS (Selector de Grupos)
  // ═════════════════════════════════════════════════════════════════
  Pronos: {
    async render() {
      const state = Views.state;
      const main = Views.main;
      
      main.innerHTML = `<div class="page-wrap"><div class="loading-spin"></div></div>`;
      
      const matches = await FirebaseService.getMatches();
      state.allMatches = matches;
      const gMatches = matches.filter(m => m.phase === "groups");
      const groups = [...new Set(gMatches.map(m => m.group))].sort();
      
      if (state.isAdmin || state.isAdmin2) {
        // Admin view
        const btns = groups.map(g => {
          const gm = gMatches.filter(m => m.group === g);
          const published = gm.filter(m => m.published === true).length;
          const allPub = published === gm.length;
          return `
            <button class="group-tile ${allPub ? 'group-tile-done' : published > 0 ? 'group-tile-partial' : ''}" 
                    data-route="grupo" data-params='{"group":"${g}"}'>
              <span class="gt-label">Grupo ${g}</span>
              <span class="gt-count">${published}/${gm.length} publicados</span>
            </button>`;
        }).join("");
        
        main.innerHTML = `
        <div class="page-wrap">
          <div class="page-header"><h2 class="page-title">⚽ Fase de Grupos</h2></div>
          <p style="color:var(--muted);font-size:.82rem;margin-bottom:.75rem">
            Edita equipos y marcadores, luego presiona <strong>Publicar</strong> para que los usuarios vean el grupo.
          </p>
          <div class="group-grid">${btns}</div>
        </div>`;
      } else {
        // User view
        const publishedGroups = groups.filter(g => 
          gMatches.filter(m => m.group === g).some(m => m.published !== false)
        );
        
        if (!publishedGroups.length) {
          main.innerHTML = `
          <div class="page-wrap">
            <div class="phase-locked-screen">
              <div class="pls-icon">⚽</div>
              <h2 class="pls-title">Fase de Grupos</h2>
              <p class="pls-msg">El administrador aún no ha publicado los partidos. Vuelve más tarde.</p>
            </div>
          </div>`;
          return;
        }
        
        const myPreds = await FirebaseService.getPrediction(state.currentUser.uid);
        state.myPreds = myPreds;
        
        const btns = publishedGroups.map(g => {
          const gm = gMatches.filter(m => m.group === g && m.published !== false);
          const saved = gm.filter(m => myPreds[m.id] !== undefined).length;
          const done = saved === gm.length && gm.length > 0;
          return `
            <button class="group-tile ${done ? 'group-tile-done' : saved > 0 ? 'group-tile-partial' : ''}" 
                    data-route="grupo" data-params='{"group":"${g}"}'>
              <span class="gt-label">Grupo ${g}</span>
              <span class="gt-count">${saved}/${gm.length} pronósticos</span>
            </button>`;
        }).join("");
        
        main.innerHTML = `
        <div class="page-wrap">
          <div class="page-header">
            <h2 class="page-title">⚽ Fase de Grupos</h2>
            <button class="btn-icon" onclick="Views.Pronos.printPDF()" title="Guardar PDF">💾</button>
          </div>
          <div class="group-grid">${btns}</div>
        </div>`;
      }
    },
    
    async printPDF() {
      // Implementación del PDF
      Utils.showToast("Generando PDF...", "info");
    }
  },

  Grupo: {

      }
    },

      const matches = await FirebaseService.getMatches();
      state.allMatches = matches;

      const allLocked = gm.every(m => m.locked === true);

          </div>
          <div style="display:flex;gap:.35rem;align-items:center;flex-wrap:wrap">
            <input type="text" id="eh_${m.id}" value="${m.home}" placeholder="Local" class="inp" style="flex:1;min-width:90px;margin-bottom:0;font-size:.8rem">
            <span style="color:var(--muted);font-size:.8rem">vs</span>
            <input type="text" id="ea_${m.id}" value="${m.away}" placeholder="Visitante" class="inp" style="flex:1;min-width:90px;margin-bottom:0;font-size:.8rem">
            <input type="number" id="sh_${m.id}" value="${m.official?.home ?? ""}" min="0" max="30" placeholder="L" class="sinp sinp-sm">
            <span style="color:var(--muted)">-</span>
            <input type="number" id="sa_${m.id}" value="${m.official?.away ?? ""}" min="0" max="30" placeholder="V" class="sinp sinp-sm">
            <button onclick="Views.Grupo.saveMatch('${m.id}', '${g}')" class="btn-xs btn-ok">✔</button>
          </div>
        </div>
      `).join("");
      
      main.innerHTML = `
      <div class="page-wrap">
        <div class="page-header">
          <button data-route="pronos" class="btn-back">‹ Grupos</button>
          <h2 class="page-title">Grupo ${g}</h2>
        </div>
        <div class="acard">
          <div class="matches-admin">${rows}</div>
          <div style="display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap">
            <button class="btn-save-all" style="flex:1;margin-top:0" onclick="Views.Grupo.publish('${g}')">
              📢 ${allPub ? 'Actualizar' : 'Publicar'} Grupo ${g}
            </button>
            <button class="btn-save-all" style="flex:1;margin-top:0;background:linear-gradient(135deg,#7f1d1d,#dc2626);border-color:rgba(220,38,38,.3)" 
                    onclick="Views.Grupo.toggleLock('${g}', ${!allLocked})">
              ${allLocked ? '🔓 Abrir pronósticos' : '🔒 Cerrar pronósticos'}
            </button>
          </div>
          <div style="display:flex;gap:.75rem;margin-top:.5rem;flex-wrap:wrap">
            <button class="btn-sm btn-warn" onclick="Views.Grupo.resetResults('${g}')">🗑 Resetear marcadores</button>
            <button class="btn-sm" onclick="Views.Grupo.printPDF('${g}')">💾 PDF pronósticos</button>
          </div>
        </div>
      </div>`;
    },
    
    async renderUser(g) {
      const state = Views.state;
      const main = Views.main;
      
      // Limpiar listener anterior
      if (state.matchesListener) {
        state.matchesListener();
        state.matchesListener = null;
      }
      
      const myPreds = await FirebaseService.getPrediction(state.currentUser.uid);
      state.myPreds = myPreds;
      
      // Suscribirse a cambios en tiempo real
      state.matchesListener = FirebaseService.subscribeToMatches((matches) => {
        state.allMatches = matches;
        Views.Grupo.buildUserView(g, myPreds, matches);
      });
    },
    
    buildUserView(g, myPreds, matches) {
      const main = Views.main;
      const gm = matches.filter(m => m.group === g && m.published !== false);
      
      // Guardar valores actuales de inputs
      const saved = {};
      gm.forEach(m => {
        const he = document.getElementById(`h_${m.id}`);
        const ae = document.getElementById(`a_${m.id}`);
        if (he && ae) {
          saved[m.id] = { h: he.value, a: ae.value };
        }
      });
      
      let hasUnsaved = false;
      const rows = gm.map(m => {
        const pred = myPreds[m.id];
        const locked = m.locked || pred !== undefined;
        const off = m.official;
        let pts = null;
        if (pred && off) pts = Utils.calcPoints(pred, off);
        const sv = saved[m.id] || { h: "", a: "" };
        
        let inputHtml = "";
        if (locked && pred !== undefined) {
          inputHtml = `
          <div class="pred-result">
            <span class="pred-score-v2">${pred.home} — ${pred.away}</span>
            ${pts !== null ? `<span class="pts-badge pts-${pts}">${pts}pt</span>` : ""}
            ${off ? `<span class="off-score">Oficial: ${off.home}-${off.away}</span>` : ""}
          </div>`;
        } else if (m.locked) {
          inputHtml = `<div class="locked-badge">🔒 Bloqueado</div>`;
        } else {
          hasUnsaved = true;
          inputHtml = `
          <div class="score-inputs">
            <input type="number" id="h_${m.id}" min="0" max="20" placeholder="0" class="sinp" value="${sv.h}">
            <span class="sinp-sep">—</span>
            <input type="number" id="a_${m.id}" min="0" max="20" placeholder="0" class="sinp" value="${sv.a}">
          </div>`;
        }
        
        return `
        <div class="match-card-v2 ${locked && pred ? 'mc-done' : ''}">
          <div class="mc-teams">
            <span>${Utils.getFlag(m.home)} ${m.home}</span>
            <span class="mc-vs">vs</span>
            <span>${m.away} ${Utils.getFlag(m.away)}</span>
          </div>
          <div class="mc-date">📅 ${m.date} ${m.time}</div>
          ${inputHtml}
        </div>`;
      }).join("");
      
      main.innerHTML = `
      <div class="page-wrap">
        <div class="page-header">
          <button data-route="pronos" class="btn-back">‹ Grupos</button>
          <h2 class="page-title">Grupo ${g}</h2>
        </div>
        <div class="matches-v2">${rows}</div>
        ${hasUnsaved ? `<button class="btn-save-all" onclick="Views.Grupo.save('${g}')">💾 Guardar Grupo ${g}</button>` : ""}
      </div>`;
    },
    
    async saveMatch(id, g) {
      const home = document.getElementById(`eh_${id}`)?.value.trim() || "TBD";
      const away = document.getElementById(`ea_${id}`)?.value.trim() || "TBD";
      const sh = document.getElementById(`sh_${id}`)?.value;
      const sa = document.getElementById(`sa_${id}`)?.value;
      
      const update = { home, away };
      if (sh !== "" && sa !== "" && !isNaN(parseInt(sh)) && !isNaN(parseInt(sa))) {
        update.official = { home: parseInt(sh), away: parseInt(sa) };
      }
      
      await FirebaseService.updateMatch(id, update);
      Utils.showToast("✅ Guardado", "success");
      Router.navigate('grupo', { group: g });
    },
    
    async publish(g) {
      const state = Views.state;
      const gm = state.allMatches.filter(m => m.group === g);
      
      await Promise.all(gm.map(m => {
        const home = document.getElementById(`eh_${m.id}`)?.value.trim() || m.home;
        const away = document.getElementById(`ea_${m.id}`)?.value.trim() || m.away;
        const sh = document.getElementById(`sh_${m.id}`)?.value;
        const sa = document.getElementById(`sa_${m.id}`)?.value;
        
        const update = { home, away, published: true };
        if (sh !== "" && sa !== "" && !isNaN(parseInt(sh)) && !isNaN(parseInt(sa))) {
          update.official = { home: parseInt(sh), away: parseInt(sa) };
        }
        return FirebaseService.updateMatch(m.id, update);
      }));
      
      Utils.showToast(`✅ Grupo ${g} publicado`, "success");
      Router.navigate('grupo', { group: g });
    },
    
    async toggleLock(g, state) {
      const matches = await FirebaseService.getMatches();
      const gm = matches.filter(m => m.group === g);
      await Promise.all(gm.map(m => FirebaseService.updateMatch(m.id, { locked: state })));
      Utils.showToast(`✅ Pronósticos del Grupo ${g} ${state ? 'cerrados' : 'abiertos'}`, "success");
      Router.navigate('grupo', { group: g });
    },
    
    async resetResults(g) {
      if (!confirm(`¿Borrar todos los marcadores oficiales del Grupo ${g}?`)) return;
      const matches = await FirebaseService.getMatches();
      const gm = matches.filter(m => m.group === g);
      await Promise.all(gm.map(m => FirebaseService.updateMatch(m.id, { official: null })));
      Utils.showToast(`✅ Marcadores del Grupo ${g} reseteados`, "success");
      Router.navigate('grupo', { group: g });
    },
    
    async save(g) {
      const state = Views.state;
      const gm = state.allMatches.filter(m => m.group === g && m.published !== false);
      const existing = await FirebaseService.getPrediction(state.currentUser.uid);
      let saved = 0;
      
      for (const m of gm) {
        if (existing[m.id] !== undefined || m.locked) continue;
        const h = parseInt(document.getElementById(`h_${m.id}`)?.value);
        const a = parseInt(document.getElementById(`a_${m.id}`)?.value);
        if (!isNaN(h) && !isNaN(a)) {
          existing[m.id] = { home: h, away: a };
          saved++;
        }
      }
      
      if (!saved) {
        Utils.showToast("⚠️ Ingresa los marcadores primero", "warning");
        return;
      }
      
      await FirebaseService.savePrediction(state.currentUser.uid, existing);
      state.myPreds = existing;
      Utils.showToast(`✅ Grupo ${g} guardado`, "success");
      
      // Limpiar listener y volver
      if (state.matchesListener) {
        state.matchesListener();
        state.matchesListener = null;
      }
      Router.navigate('pronos');
    },
    
    printPDF(g) {
      Utils.showToast("Generando PDF...", "info");
    }
  },

            </button>

              <span id="pb-away-flag"></span>
              <span id="pb-away-name"></span>
            </button>
          </div>

        </div>
      </div>`;
    },
    
    // Variables para modal de penales
    _penalMatchId: null,
    _penalHome: null,
    _penalAway: null,
    _penalWinner: null,
    
    checkDraw(id, home, away) {
      const h = parseInt(document.getElementById(`h_${id}`)?.value);
      const a = parseInt(document.getElementById(`a_${id}`)?.value);
      if (!isNaN(h) && !isNaN(a) && h === a) {
        this.openPenalModal(id, home, away, h);
      }
    },
    
    openPenalModal(id, home, away, score) {
      this._penalMatchId = id;
      this._penalHome = home;
      this._penalAway = away;
      this._penalWinner = null;
      
      const h = score ?? parseInt(document.getElementById(`h_${id}`)?.value) ?? 0;
      document.getElementById("pm-phase").textContent = `${home} vs ${away}`;
      const sel = document.getElementById("pm-score");
      if (sel && !isNaN(h)) sel.value = `${h}-${h}`;
      
      document.getElementById("pb-home-flag").textContent = Utils.getFlag(home);
      document.getElementById("pb-home-name").textContent = home;
      document.getElementById("pb-away-flag").textContent = Utils.getFlag(away);
      document.getElementById("pb-away-name").textContent = away;
      
      document.getElementById("pb-home").classList.remove("selected");
      document.getElementById("pb-away").classList.remove("selected");
      
      const prev = window._elimPenals?.[id];
      if (prev) {
        this._penalWinner = prev;
        document.getElementById(prev === home ? "pb-home" : "pb-away").classList.add("selected");
      }
      
      document.getElementById("penal-overlay").style.display = "flex";
    },
    
    closePenalModal() {
      document.getElementById("penal-overlay").style.display = "none";
    },
    
    selectPenalWinner(side) {
      this._penalWinner = side === "home" ? this._penalHome : this._penalAway;
      document.getElementById("pb-home").classList.toggle("selected", side === "home");
      document.getElementById("pb-away").classList.toggle("selected", side === "away");
    },
    
    confirmPenal() {
      if (!this._penalWinner) {
        Utils.showToast("⚠️ Selecciona quién clasifica", "warning");
        return;
      }
      
      const scoreVal = document.getElementById("pm-score").value;
      const [sh, sa] = scoreVal.split("-").map(Number);
      
      const hi = document.getElementById(`h_${this._penalMatchId}`);
      const ai = document.getElementById(`a_${this._penalMatchId}`);
      if (hi) hi.value = sh;
      if (ai) ai.value = sa;
      
      if (!window._elimPenals) window._elimPenals = {};
      window._elimPenals[this._penalMatchId] = this._penalWinner;
      
      this.closePenalModal();
      Utils.showToast(`✅ Empate ${sh}-${sa}, clasifica ${this._penalWinner}`, "success");
      
      const btn = document.querySelector(`#mc_${this._penalMatchId} .btn-pen`);
      if (btn) btn.outerHTML = `<span class="pen-chip">🏆 ${this._penalWinner}</span>`;
    },
    
    async save(phaseKey) {
      const state = Views.state;
      const pm = state.allMatches.filter(m => m.phase === phaseKey && m.published === true);
      const existing = await FirebaseService.getPrediction(state.currentUser.uid);
      let saved = 0;
      
      for (const m of pm) {
        if (existing[m.id] !== undefined || m.locked || m.home === "TBD" || m.away === "TBD") continue;
        const h = parseInt(document.getElementById(`h_${m.id}`)?.value);
        const a = parseInt(document.getElementById(`a_${m.id}`)?.value);
        if (isNaN(h) || isNaN(a)) continue;
        
        const pred = { home: h, away: a };
        if (h === a && window._elimPenals?.[m.id]) {
          pred.penaltyWinner = window._elimPenals[m.id];
        }
        existing[m.id] = pred;
        saved++;
      }
      
      if (!saved) {
        Utils.showToast("⚠️ Ingresa los marcadores primero", "warning");
        return;
      }
      
      await FirebaseService.savePrediction(state.currentUser.uid, existing);
      state.myPreds = existing;
      window._elimPenals = {};
      Utils.showToast(`✅ ${saved} pronósticos guardados`, "success");
      
      // Recargar vista
      this.buildUserView(phaseKey, this.PHASE_LABELS[phaseKey], existing, state.allMatches);
    },
    
    async togglePhase(key, state) {
      const settings = Views.state.siteSettings;
      if (!settings.phases) settings.phases = { groups: true, r32: false, r16: false, qf: false, sf: false, tf: false, final: false };
      settings.phases[key] = state;
      await FirebaseService.saveSettings(settings);
      Utils.showToast(`${state ? '🔓 Fase abierta' : '🔒 Fase cerrada'}`, "success");
      Router.navigate(state.isAdmin ? 'admin' : 'admin2');
    },
    
    async saveMatch(id, phaseKey) {
      const home = document.getElementById(`eh_${id}`)?.value.trim() || "TBD";
      const away = document.getElementById(`ea_${id}`)?.value.trim() || "TBD";
      const sh = document.getElementById(`sh_${id}`)?.value;
      const sa = document.getElementById(`sa_${id}`)?.value;
      const pw = document.getElementById(`pw_${id}`)?.value || "";
      
      const update = { home, away };
      if (sh !== "" && sa !== "" && !isNaN(parseInt(sh)) && !isNaN(parseInt(sa))) {
        const official = { home: parseInt(sh), away: parseInt(sa) };
        if (parseInt(sh) === parseInt(sa)) {
          const existing = Views.state.allMatches.find(m => m.id === id);
          official.penaltyWinner = pw || (existing?.official?.penaltyWinner || "");
        } else {
          official.penaltyWinner = "";
        }
        update.official = official;
      }
      
      await FirebaseService.updateMatch(id, update);
      Utils.showToast("✅ Guardado", "success");
      Router.navigate(state.isAdmin ? 'admin' : 'admin2');
    },
    
    async publish(phaseKey) {
      const state = Views.state;
      const pm = state.allMatches.filter(m => m.phase === phaseKey);
      
      await Promise.all(pm.map(m => {
        const home = document.getElementById(`eh_${m.id}`)?.value.trim() || (m.home === "TBD" ? "TBD" : m.home);
        const away = document.getElementById(`ea_${m.id}`)?.value.trim() || (m.away === "TBD" ? "TBD" : m.away);
        const sh = document.getElementById(`sh_${m.id}`)?.value;
        const sa = document.getElementById(`sa_${m.id}`)?.value;
        const pw = document.getElementById(`pw_${m.id}`)?.value || "";
        
        const update = { home, away, published: true };
        if (sh !== "" && sa !== "" && !isNaN(parseInt(sh)) && !isNaN(parseInt(sa))) {
          const official = { home: parseInt(sh), away: parseInt(sa) };
          if (parseInt(sh) === parseInt(sa)) {
            official.penaltyWinner = pw || (m.official?.penaltyWinner || "");
          } else {
            official.penaltyWinner = "";
          }
          update.official = official;
        } else if (m.official) {
          update.official = m.official;
        }
        return FirebaseService.updateMatch(m.id, update);
      }));
      
      Utils.showToast(`✅ ${this.PHASE_LABELS[phaseKey]} publicada`, "success");
      Router.navigate(state.isAdmin ? 'admin' : 'admin2');
    },
    
    async toggleLock(phaseKey, state) {
      const matches = await FirebaseService.getMatches();
      const pm = matches.filter(m => m.phase === phaseKey);
      await Promise.all(pm.map(m => FirebaseService.updateMatch(m.id, { locked: state })));
      Utils.showToast(`✅ Pronósticos ${state ? 'cerrados' : 'abiertos'}`, "success");
      Router.navigate(state.isAdmin ? 'admin' : 'admin2');
    },
    
    async resetResults(phaseKey) {
      if (!confirm(`¿Borrar todos los marcadores oficiales de ${this.PHASE_LABELS[phaseKey]}?`)) return;
      const matches = await FirebaseService.getMatches();
      const pm = matches.filter(m => m.phase === phaseKey);
      await Promise.all(pm.map(m => FirebaseService.updateMatch(m.id, { official: null })));
      Utils.showToast(`✅ Marcadores de ${this.PHASE_LABELS[phaseKey]} reseteados`, "success");
      Router.navigate(state.isAdmin ? 'admin' : 'admin2');
    },
    
    async resetTeams(phaseKey) {
      if (!confirm(`¿Resetear los equipos de ${this.PHASE_LABELS[phaseKey]}?`)) return;
      const matches = await FirebaseService.getMatches();
      const pm = matches.filter(m => m.phase === phaseKey);
      await Promise.all(pm.map(m => FirebaseService.updateMatch(m.id, { home: "TBD", away: "TBD", official: null, published: false })));
      Utils.showToast(`✅ Equipos de ${this.PHASE_LABELS[phaseKey]} reseteados`, "success");
      Router.navigate(state.isAdmin ? 'admin' : 'admin2');
    },
    
    printPDF(phaseKey) {
      Utils.showToast("Generando PDF...", "info");
    },
    
    printMyPDF(phaseKey, label) {
      Utils.showToast("Generando comprobante...", "info");
    }
  },

  // ═════════════════════════════════════════════════════════════════
  //  VISTA: ADMIN2
  // ═════════════════════════════════════════════════════════════════
  Admin2: {
    async render() {
      const state = Views.state;
      const main = Views.main;
      
      if (!state.isAdmin2) {
        main.innerHTML = `<div class="page-wrap"><p>Acceso denegado.</p></div>`;
        return;
      }
      
      main.innerHTML = `
      <div class="page-wrap admin-v2">
        <h2 class="page-title">⚙️ Admin</h2>
        <div class="acard">
          <h3>Panel Admin 2</h3>
          <p>Funciones limitadas de administración.</p>
        </div>
      </div>`;
    }
  }
};

// ═════════════════════════════════════════════════════════════════
//  MÓDULO: APLICACIÓN PRINCIPAL
// ═════════════════════════════════════════════════════════════════
const App = {
  async init() {
    // Registrar rutas
    this.registerRoutes();
    
    // Inicializar router
    Router.init();
    
    // Escuchar cambios de autenticación
    FirebaseService.onAuthChanged(async (user) => {
      Views.state.currentUser = user;
      
      if (user) {
        Views.state.isAdmin = user.email === CONFIG.ADMIN_EMAIL;
        Views.state.isAdmin2 = user.email === CONFIG.ADMIN2_EMAIL;
        
        // Cargar datos del usuario
        Views.state.userData = await FirebaseService.getUser(user.uid);
        
        // Inicializar matches si es necesario
        await FirebaseService.initMatches();
        
        // Cargar settings
        const settings = await FirebaseService.getSettings();
        if (settings) Views.state.siteSettings = { ...Views.state.siteSettings, ...settings };
        
        // Verificar acceso
        if (Views.state.isAdmin || Views.state.isAdmin2 || Views.state.userData?.accessCode) {
          this.initMainApp();
        } else {
          Views.AccessGate.render();
        }
      } else {
        // No hay usuario - mostrar login
        Views.Auth.render();
      }
    });
  },
  
  registerRoutes() {
    Router.register('inicio', () => Views.Inicio.render());
    Router.register('pronos', () => Views.Pronos.render());
    Router.register('grupo', (params) => Views.Grupo.render(params));
    Router.register('r32', () => Views.FaseElim.render({ phase: 'r32' }));
    Router.register('r16', () => Views.FaseElim.render({ phase: 'r16' }));
    Router.register('qf', () => Views.FaseElim.render({ phase: 'qf' }));
    Router.register('sf', () => Views.FaseElim.render({ phase: 'sf' }));
    Router.register('tf', () => Views.FaseElim.render({ phase: 'tf' }));
    Router.register('final', () => Views.FaseElim.render({ phase: 'final' }));
    Router.register('tabla', () => Views.Tabla.render());
    Router.register('stats', () => Views.Stats.render());
    Router.register('probs', () => Views.Probs.render());
    Router.register('reglas', () => Views.Reglas.render());
    Router.register('admin', () => Views.Admin.render());
    Router.register('admin2', () => Views.Admin2.render());
  },
  
  initMainApp() {
    // Renderizar layout principal
    Views.MainLayout.render();
    
    // Iniciar listeners globales
    this.startGlobalListeners();
    
    // Navegar a inicio
    Router.navigate('inicio');
  },
  
  startGlobalListeners() {
    const state = Views.state;
    
    // Listener de settings
    state.settingsListener = FirebaseService.subscribeToSettings((newSettings) => {
      const oldAnn = state.siteSettings.announcement;
      const oldPhases = JSON.stringify(state.siteSettings.phases || {});
      
      state.siteSettings = { ...state.siteSettings, ...newSettings };
      Views.MainLayout.applyBg();
      
      // Notificar anuncio nuevo
      if (newSettings.announcement && newSettings.announcement !== oldAnn && oldAnn !== undefined) {
        Utils.showToast(`📢 ${newSettings.announcement}`, "info");
      }
      
      // Notificar fase nueva
      const newPhases = state.siteSettings.phases || {};
      const oldPhasesObj = JSON.parse(oldPhases);
      const phaseNames = {
        r32: "16avos de Final", r16: "Octavos de Final", qf: "Cuartos de Final",
        sf: "Semifinales", tf: "Tercer Lugar", final: "Gran Final"
      };
      
      Object.keys(phaseNames).forEach(k => {
        if (newPhases[k] && !oldPhasesObj[k]) {
          Utils.showToast(`🔓 ¡${phaseNames[k]} desbloqueado!`, "success");
        }
      });
    });
  }
};

// Inicializar aplicación
App.init();

// Exponer funciones globales necesarias para event handlers inline
window.Views = Views;
window.Router = Router;
window.Sidebar = Sidebar;
window.Utils = Utils;
window.FirebaseService = FirebaseService;

</script>
