const ALL_MATCHES=[...GROUP_MATCHES,...ELIM_MATCHES];

async function initMatches(){
  const snap=await getDoc(doc(db,"settings","matchesInit"));
  if(snap.exists()) return;
  await Promise.all(ALL_MATCHES.map(m=>setDoc(doc(db,"matches",m.id),m)));
  await setDoc(doc(db,"settings","matchesInit"),{done:true,ts:serverTimestamp()});
}

async function loadSettings(){
  const snap=await getDoc(doc(db,"settings","site"));
  if(snap.exists()) siteSettings={...siteSettings,...snap.data()};
  else await setDoc(doc(db,"settings","site"),siteSettings);
  applyBg();
}

function applyBg(){
  if(siteSettings.bgImage){
    document.body.style.backgroundImage=`url(${siteSettings.bgImage})`;
    document.body.style.backgroundSize="cover";
    document.body.style.backgroundAttachment="fixed";
  } else {
    document.body.style.backgroundImage="";
    document.body.style.backgroundColor=siteSettings.bg||"#060612";
  }
}

// calcPoints estándar (grupos)
function calcPoints(pred,official){
  if(!official||official.home===null||official.home===undefined) return null;
  const ph=Number(pred.home), pa=Number(pred.away);
  const oh=Number(official.home), oa=Number(official.away);
  if(isNaN(ph)||isNaN(pa)||isNaN(oh)||isNaN(oa)) return 0;
  if(ph===oh&&pa===oa) return 3;
  const pw=ph>pa?"h":ph<pa?"a":"d";
  const ow=oh>oa?"h":oh<oa?"a":"d";
  return pw===ow?1:0;
}

// calcPoints para fases eliminatorias (con bonus de penales)
function calcPointsElim(pred,official){
  if(!official||official.home===null||official.home===undefined) return null;
  const ph=Number(pred.home), pa=Number(pred.away);
  const oh=Number(official.home), oa=Number(official.away);
  if(isNaN(ph)||isNaN(pa)||isNaN(oh)||isNaN(oa)) return 0;
  const isExact=(ph===oh&&pa===oa);
  const pw=ph>pa?"h":ph<pa?"a":"d";
  const ow=oh>oa?"h":oh<oa?"a":"d";
  let pts=0;
  if(isExact) pts=3;
  else if(pw===ow) pts=1;
  // Bono +1: solo si hubo empate oficial, usuario predijo empate,
  // Y acertó al ganador en penales. Si no acertó penales no se penaliza.
  if(ow==="d"&&pw==="d"&&official.penaltyWinner&&pred.penaltyWinner){
    if(pred.penaltyWinner===official.penaltyWinner) pts+=1;
  }
  return pts;
}

  if(isAdmin||isAdmin2){renderFaseElimAdmin(main,phaseKey);return;}
  main.innerHTML=`<div class="page-wrap"><div class="loading-spin"></div></div>`;

  const matchSnap=await getDocs(collection(db,"matches"));
  allMatches=matchSnap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const predSnap=await getDoc(doc(db,"predictions",currentUser.uid));

    allMatches=snap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    buildElimView(main,phaseKey,label,window._myPreds);
  });

function buildElimView(main,phaseKey,label,myPreds){
  const pm=allMatches.filter(m=>m.phase===phaseKey&&m.published===true);
  if(!pm.length){
    main.innerHTML=`<div class="page-wrap">
      <div class="phase-locked-screen">
        <div class="pls-icon">⏳</div>
        <h2 class="pls-title">${label}</h2>
        <p class="pls-msg">El administrador aún no ha publicado los partidos de esta fase.</p>
      </div>
    </div>`;
    return;
  }
  const saved={};
  pm.forEach(m=>{
    const he=document.getElementById(`h_${m.id}`);
    const ae=document.getElementById(`a_${m.id}`);
    if(he&&ae){saved[m.id]={h:he.value,a:ae.value};}
  });
  let hasUnsaved=false;
  let rows=pm.map(m=>{
    const pred=myPreds[m.id];
    const locked=m.locked||pred!==undefined;
    const off=m.official;
    let pts=null;
    if(pred&&off) pts=calcPointsElim(pred,off);
    const sv=saved[m.id]||{h:"",a:""};
    let inputHtml="";

    if(locked&&pred!==undefined){
      // Mostrar pronóstico guardado
      const isDrawPred=pred.home===pred.away;
      const penWinner=pred.penaltyWinner||null;
      inputHtml=`<div class="pred-result">
        <span class="pred-score-v2">${pred.home} — ${pred.away}${isDrawPred&&penWinner?` <span class="pen-winner-badge">🏆 ${penWinner}</span>`:''}</span>
        ${pts!==null?`<span class="pts-badge pts-${Math.min(pts,3)}">${pts}pt${pts===4?'s':''}</span>`:""}
        ${off?`<span class="off-score">Oficial: ${off.home}-${off.away}${off.penaltyWinner?' ('+off.penaltyWinner+' pens)':''}</span>`:""}
      </div>`;
    } else if(m.locked){
      inputHtml=`<div class="locked-badge">🔒 Bloqueado</div>`;
    } else if(m.home==="TBD"||m.away==="TBD"){
      inputHtml=`<div class="locked-badge">⏳ Equipos por definir</div>`;
    } else {
      hasUnsaved=true;
      // Input con detección de empate → abre modal
      const penStored=window._elimPenals?.[m.id];
      inputHtml=`<div class="score-inputs">
        <input type="number" id="h_${m.id}" min="0" max="20" placeholder="0" class="sinp" value="${sv.h}"
          oninput="checkElimDraw('${m.id}','${m.home}','${m.away}')">
        <span class="sinp-sep">—</span>

// Variables para el modal de penales
if(!window._elimPenals) window._elimPenals={};
let _penalMatchId=null, _penalHome=null, _penalAway=null, _penalWinner=null;

window.checkElimDraw=(id,home,away)=>{
  const h=parseInt(document.getElementById(`h_${id}`)?.value);
  const a=parseInt(document.getElementById(`a_${id}`)?.value);
  if(!isNaN(h)&&!isNaN(a)&&h===a){
    openPenalModal(id,home,away,h);
  }
};

window.openPenalModal=(id,home,away,score)=>{
  _penalMatchId=id; _penalHome=home; _penalAway=away; _penalWinner=null;
  const h=score??parseInt(document.getElementById(`h_${id}`)?.value)??0;
  document.getElementById("pm-phase").textContent=`${home} vs ${away}`;
  const sel=document.getElementById("pm-score");
  if(sel&&!isNaN(h)) sel.value=`${h}-${h}`;
  document.getElementById("pb-home-flag").textContent=f(home);
  document.getElementById("pb-home-name").textContent=home;
  document.getElementById("pb-away-flag").textContent=f(away);
  document.getElementById("pb-away-name").textContent=away;
  document.getElementById("pb-home").classList.remove("selected");
  document.getElementById("pb-away").classList.remove("selected");
  // Si ya tenía ganador guardado, marcarlo
  const prev=window._elimPenals[id];
  if(prev){
    _penalWinner=prev;
    document.getElementById(prev===home?"pb-home":"pb-away").classList.add("selected");
  }
  document.getElementById("penal-overlay").style.display="flex";
};

window.closePenalModal=()=>{
  document.getElementById("penal-overlay").style.display="none";
};

window.selectPenalWinner=(side)=>{
  _penalWinner=side==="home"?_penalHome:_penalAway;
  document.getElementById("pb-home").classList.toggle("selected",side==="home");
  document.getElementById("pb-away").classList.toggle("selected",side==="away");
};

window.confirmPenal=()=>{
  if(!_penalWinner){showToast("⚠️ Selecciona quién clasifica","warning");return;}
  const scoreVal=document.getElementById("pm-score").value;
  const[sh,sa]=scoreVal.split("-").map(Number);
  // Actualizar inputs de marcador
  const hi=document.getElementById(`h_${_penalMatchId}`);
  const ai=document.getElementById(`a_${_penalMatchId}`);
  if(hi) hi.value=sh;
  if(ai) ai.value=sa;
  // Guardar ganador local
  window._elimPenals[_penalMatchId]=_penalWinner;
  closePenalModal();
  showToast(`✅ Empate ${sh}-${sa}, clasifica ${_penalWinner}`,"success");
  // Actualizar chip visual
  const btn=document.querySelector(`#mc_${_penalMatchId} .btn-pen`);
  if(btn) btn.outerHTML=`<span class="pen-chip">🏆 ${_penalWinner}</span>`;
};

window.saveElimPreds=async(phaseKey)=>{
  const pm=allMatches.filter(m=>m.phase===phaseKey&&m.published===true);
  const ref=doc(db,"predictions",currentUser.uid);
  const snap=await getDoc(ref);
  const existing=snap.exists()?snap.data().preds||{}:{};
  let saved=0;
  for(const m of pm){
    if(existing[m.id]!==undefined||m.locked||m.home==="TBD"||m.away==="TBD") continue;
    const h=parseInt(document.getElementById(`h_${m.id}`)?.value);
    const a=parseInt(document.getElementById(`a_${m.id}`)?.value);
    if(isNaN(h)||isNaN(a)) continue;
    const pred={home:h,away:a};
    // Si fue empate, guardar ganador de penales
    if(h===a&&window._elimPenals[m.id]){
      pred.penaltyWinner=window._elimPenals[m.id];
    }
    existing[m.id]=pred;
    saved++;
  }
  if(!saved){showToast("⚠️ Ingresa los marcadores primero","warning");return;}
  await setDoc(ref,{uid:currentUser.uid,preds:existing},{merge:true});
  window._myPreds=existing;
  window._elimPenals={};
  showToast(`✅ ${saved} pronósticos guardados`,"success");
  // Recargar vista
  buildElimView(document.getElementById("main"),phaseKey,PHASE_LABELS[phaseKey]||phaseKey,existing);
};

// ── PDF por fase — Admin (todos los usuarios) ─────────────────────
// ── Función compartida para PDF de fases eliminatorias ───────────
function buildElimPDFDoc(phaseKey, phaseLabel, matches, entries){
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"letter"});
  const W=pdf.internal.pageSize.width;
  const H=pdf.internal.pageSize.height;
  const COL_W=W-30; // columna única centrada
  const X=15;       // margen izquierdo

  entries.forEach((entry,idx)=>{
    if(idx>0) pdf.addPage();
    const u=entry.user;
    const preds=entry.preds;
    const userName=u.displayName||u.name||u.email||"—";
    const fecha=new Date().toLocaleDateString("es-GT",{day:"2-digit",month:"2-digit",year:"numeric"});

    // ── HEADER ──────────────────────────────────────────────────
    pdf.setFillColor(11,22,18);
    pdf.rect(0,0,W,22,"F");
    pdf.setFillColor(201,168,76);
    pdf.rect(0,22,W,1.2,"F");
    pdf.setTextColor(201,168,76);
    pdf.setFont("helvetica","bold");
    pdf.setFontSize(13);
    pdf.text("QUINIELA MUNDIAL 2026",W/2,9,{align:"center"});
    pdf.setFontSize(8);
    pdf.setTextColor(180,160,100);
    pdf.text(`Comprobante Oficial — ${phaseLabel}`,W/2,15,{align:"center"});
    pdf.setFontSize(7);
    pdf.setTextColor(140,130,80);
    pdf.text("Canada | Mexico | USA 2026",W/2,19.5,{align:"center"});

    // ── INFO PARTICIPANTE ────────────────────────────────────────
    pdf.setFillColor(20,40,30);
    pdf.rect(0,23.2,W,9,"F");
    pdf.setTextColor(255,255,255);
    pdf.setFont("helvetica","bold");
    pdf.setFontSize(8.5);
    pdf.text(userName,X,28.5);
    pdf.setFont("helvetica","normal");
    pdf.setFontSize(7);
    pdf.setTextColor(180,180,180);
    pdf.text(u.phone||u.email||"",X,32.5);
    pdf.setTextColor(201,168,76);
    pdf.text(`Fecha: ${fecha}`,W-X,32.5,{align:"right"});

    // ── ENCABEZADO DE FASE ───────────────────────────────────────
    let curY=35;
    pdf.setFillColor(26,58,40);
    pdf.rect(X,curY,COL_W,7,"F");
    pdf.setDrawColor(201,168,76);
    pdf.setLineWidth(0.4);
    pdf.rect(X,curY,COL_W,7,"S");
    pdf.setTextColor(201,168,76);
    pdf.setFont("helvetica","bold");
    pdf.setFontSize(9);
    pdf.text(phaseLabel.toUpperCase(),W/2,curY+4.8,{align:"center"});
    curY+=10;

    // Sub-encabezado columnas
    pdf.setFillColor(15,30,22);
    pdf.rect(X,curY,COL_W,5,"F");
    pdf.setTextColor(150,170,150);
    pdf.setFont("helvetica","normal");
    pdf.setFontSize(6);
    const W4=COL_W/4;
    pdf.text("LOCAL",X+W4*0.5,curY+3.3,{align:"center"});
    pdf.text("MI PRONÓSTICO",X+W4*1.5,curY+3.3,{align:"center"});
    pdf.text("RESULTADO OFICIAL",X+W4*2.5,curY+3.3,{align:"center"});
    pdf.text("PTS",X+W4*3.5,curY+3.3,{align:"center"});
    curY+=5;

    // ── PARTIDOS ─────────────────────────────────────────────────
    matches.forEach((m,i)=>{
      const pred=preds[m.id];
      const off=m.official;
      const pts=pred&&off&&off.home!==null?calcPointsElim(pred,off):null;

      const predTxt=pred?`${pred.home} — ${pred.away}`:"? — ?";
      const penTxt=pred?.penaltyWinner?` (${pred.penaltyWinner})`:"";
      const offTxt=off&&off.home!==null?`${off.home} — ${off.away}`:"—";
      const offPenTxt=off?.penaltyWinner?` (${off.penaltyWinner})`:"";
      const ptsStr=pts!==null?`${pts}pt`:"—";

      // Fondo fila alternado
      if(i%2===0) pdf.setFillColor(245,250,247);
      else pdf.setFillColor(255,255,255);
      pdf.rect(X,curY,COL_W,9,"F");

      // Barra lateral color resultado
      if(pts===3||pts===4) pdf.setFillColor(46,158,91);
      else if(pts===2||pts===1) pdf.setFillColor(201,168,76);
      else if(pts===0) pdf.setFillColor(192,57,43);
      else pdf.setFillColor(200,200,200);
      pdf.rect(X,curY,1.8,9,"F");

      // Etiqueta del partido (label pequeño arriba)
      pdf.setFont("helvetica","normal");
      pdf.setFontSize(5);
      pdf.setTextColor(120,120,120);
      const dp=m.date.split("-");
      pdf.text(`${m.label||""} · ${dp[2]}/${dp[1]} ${m.time}`,X+2.5,curY+2);

      // Equipo LOCAL (columna 1)
      pdf.setFont("helvetica","bold");
      pdf.setFontSize(7);
      pdf.setTextColor(20,20,20);
      const homeTxt=m.home.length>13?m.home.substring(0,12)+"…":m.home;
      pdf.text(homeTxt,X+W4*0.5,curY+6.5,{align:"center"});

      // PRONÓSTICO (columna 2)
      if(pts===3||pts===4) pdf.setTextColor(22,101,52);
      else if(pts===2||pts===1) pdf.setTextColor(133,100,4);
      else if(pts===0) pdf.setTextColor(153,27,27);
      else pdf.setTextColor(40,80,55);
      pdf.setFontSize(8.5);
      pdf.text(predTxt,X+W4*1.5,curY+5.8,{align:"center"});
      if(penTxt){
        pdf.setFontSize(5);
        pdf.setTextColor(100,80,20);
        pdf.text(`Pens: ${pred.penaltyWinner}`,X+W4*1.5,curY+8,{align:"center"});
      }

      // RESULTADO OFICIAL (columna 3)
      pdf.setFont("helvetica","normal");
      pdf.setFontSize(7.5);
      pdf.setTextColor(80,80,80);
      pdf.text(offTxt,X+W4*2.5,curY+5.8,{align:"center"});
      if(offPenTxt){
        pdf.setFontSize(5);
        pdf.setTextColor(120,120,120);
        pdf.text(`Pens: ${off.penaltyWinner}`,X+W4*2.5,curY+8,{align:"center"});
      }

      // PTS (columna 4)
      pdf.setFont("helvetica","bold");
      pdf.setFontSize(9);
      if(pts===3||pts===4) pdf.setTextColor(22,101,52);
      else if(pts===2||pts===1) pdf.setTextColor(133,100,4);
      else if(pts===0) pdf.setTextColor(153,27,27);
      else pdf.setTextColor(150,150,150);
      pdf.text(ptsStr,X+W4*3.5,curY+5.8,{align:"center"});

      // Equipo VISITANTE (debajo del local)
      pdf.setFont("helvetica","bold");
      pdf.setFontSize(7);
      pdf.setTextColor(20,20,20);
      const awayTxt=m.away.length>13?m.away.substring(0,12)+"…":m.away;
      pdf.text(`vs ${awayTxt}`,X+W4*0.5,curY+8.2,{align:"center"});

      // Línea separadora sutil
      pdf.setDrawColor(220,230,225);
      pdf.setLineWidth(0.1);
      pdf.line(X,curY+9,X+COL_W,curY+9);

      curY+=9;
    });

    // Línea dorada al final
    pdf.setDrawColor(201,168,76);
    pdf.setLineWidth(0.4);
    pdf.line(X,curY+1,X+COL_W,curY+1);

    // ── LEYENDA ──────────────────────────────────────────────────
    curY+=4;
    pdf.setFont("helvetica","normal");
    pdf.setFontSize(6);
    pdf.setFillColor(46,158,91); pdf.rect(X,curY,3,3,"F");
    pdf.setTextColor(50,50,50); pdf.text("3-4pts = Exacto",X+4.5,curY+2.5);
    pdf.setFillColor(201,168,76); pdf.rect(X+40,curY,3,3,"F");
    pdf.text("1-2pts = Ganador / Bono penales",X+45,curY+2.5);
    pdf.setFillColor(192,57,43); pdf.rect(X+110,curY,3,3,"F");
    pdf.text("0pts = Fallo",X+115,curY+2.5);

    // ── FOOTER ───────────────────────────────────────────────────
    pdf.setFillColor(11,22,18);
    pdf.rect(0,H-10,W,10,"F");
    pdf.setFillColor(201,168,76);
    pdf.rect(0,H-10,W,0.8,"F");
    pdf.setTextColor(140,120,80);
    pdf.setFont("helvetica","normal");
    pdf.setFontSize(6);
    pdf.text("Quiniela Mundial 2026 — Comprobante generado automaticamente",W/2,H-5.5,{align:"center"});
    pdf.setTextColor(100,100,100);
    pdf.text("3pts exacto | +1pt bono penales | 1pt ganador | 0pts fallo",W/2,H-2,{align:"center"});
  });

  return pdf;
}

window.printFasePDF=async(phaseKey)=>{
  showToast("Generando PDF...","info");
  const matchSnap=await getDocs(collection(db,"matches"));
  const allM=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const matches=allM.filter(m=>m.phase===phaseKey&&m.published===true);
  if(!matches.length){showToast("No hay partidos publicados en esta fase","warning");return;}
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={}; usersSnap.forEach(d=>{uMap[d.id]=d.data();});
  const all=[];
  predsSnap.forEach(d=>{
    if(uMap[d.id]&&uMap[d.id].email!==ADMIN_EMAIL&&uMap[d.id].email!==ADMIN2_EMAIL)
      all.push({user:uMap[d.id],preds:d.data().preds||{}});
  });
  all.sort((a,b)=>(a.user.displayName||"").localeCompare(b.user.displayName||""));
  if(!all.length){showToast("No hay participantes aún","warning");return;}
  const phaseLabel=PHASE_LABELS[phaseKey]||phaseKey;
  const pdf=buildElimPDFDoc(phaseKey,phaseLabel,matches,all);
  savePDF(pdf,`pronosticos_${phaseKey}_${new Date().toLocaleDateString("es-GT").replace(/\//g,"-")}.pdf`);
};

window.publishPhase=async(phaseKey)=>{
  const pm=allMatches.filter(m=>m.phase===phaseKey);
  await Promise.all(pm.map(m=>{
    const home=document.getElementById("eh_"+m.id)?.value.trim()||(m.home==="TBD"?"TBD":m.home);
    const away=document.getElementById("ea_"+m.id)?.value.trim()||(m.away==="TBD"?"TBD":m.away);
    const sh=document.getElementById("sh_"+m.id)?.value;
    const sa=document.getElementById("sa_"+m.id)?.value;
    const pw=document.getElementById("pw_"+m.id)?.value||"";
    const update={home,away,published:true};
    if(sh!==""&&sa!==""&&!isNaN(parseInt(sh))&&!isNaN(parseInt(sa))){
      const official={home:parseInt(sh),away:parseInt(sa)};
      // Preservar penaltyWinner: usar el del input, o el ya guardado en Firestore
      if(parseInt(sh)===parseInt(sa)){
        official.penaltyWinner=pw||(m.official?.penaltyWinner||"");
      } else {
        official.penaltyWinner=""; // No aplica si no hubo empate
      }
      update.official=official;
    } else if(m.official){
      // Si no se tocó el marcador, preservar el oficial ya guardado
      update.official=m.official;
    }
    return updateDoc(doc(db,"matches",m.id),update);
  }));
  const matchSnap=await getDocs(collection(db,"matches"));
  allMatches=matchSnap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  showToast(`✅ ${PHASE_LABELS[phaseKey]} publicada`,"success");
  renderFaseElimAdmin(document.getElementById("main"),phaseKey);
};

window.saveElimFull=async(id,phaseKey)=>{

  const sh=document.getElementById(`sh_${id}`)?.value;
  const sa=document.getElementById(`sa_${id}`)?.value;
  const pw=document.getElementById(`pw_${id}`)?.value||"";
  const update={home,away};
  if(sh!==""&&sa!==""&&!isNaN(parseInt(sh))&&!isNaN(parseInt(sa))){
    const official={home:parseInt(sh),away:parseInt(sa)};
    if(parseInt(sh)===parseInt(sa)){

async function renderProbabilidades(main){
  main.innerHTML=`<div class="page-wrap"><div class="loading-spin"></div></div>`;
  const matchSnap=await getDocs(collection(db,"matches"));
  const matches=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={}; usersSnap.forEach(d=>{uMap[d.id]=d.data();});

  // Calcular estadísticas por partido
  const matchStats={};
  matches.forEach(m=>{matchStats[m.id]={home:0,draw:0,away:0,scores:{},total:0};});

  predsSnap.forEach(d=>{
    const uid=d.id,preds=d.data().preds||{};
    if(!uMap[uid]||uMap[uid].email===ADMIN_EMAIL||uMap[uid].email===ADMIN2_EMAIL) return;
    Object.entries(preds).forEach(([mid,pred])=>{
      if(!matchStats[mid]) return;
      const s=matchStats[mid];
      s.total++;
      if(pred.home>pred.away) s.home++;
      else if(pred.home<pred.away) s.away++;
      else s.draw++;
      const key=`${pred.home}-${pred.away}`;
      s.scores[key]=(s.scores[key]||0)+1;
    });
  });

  const groups=[...new Set(matches.filter(m=>m.phase==="groups").map(m=>m.group))].sort();

  let html=`<div class="page-wrap">
    <h2 class="page-title">🎯 Probabilidades</h2>
    <p style="color:var(--muted);font-size:.85rem;margin-top:-.5rem">Distribución de pronósticos de todos los participantes por partido.</p>`;

  for(const g of groups){
    const gMatches=matches.filter(m=>m.group===g);
    html+=`<div class="card"><div class="card-title">Grupo ${g}</div>`;
    gMatches.forEach(m=>{
      const s=matchStats[m.id]||{home:0,draw:0,away:0,scores:{},total:0};
      const tot=s.total||1;
      const homePct=Math.round(s.home/tot*100);
      const drawPct=Math.round(s.draw/tot*100);
      const awayPct=Math.round(s.away/tot*100);
      // Top 3 marcadores
      const topScores=Object.entries(s.scores).sort((a,b)=>b[1]-a[1]).slice(0,3);
      html+=`<div class="prob-match">
        <div class="prob-teams">${f(m.home)} ${m.home} vs ${m.away} ${f(m.away)}</div>
        <div class="prob-date">${m.date} — ${s.total} pronósticos</div>
        <div class="prob-bars">
          <div class="prob-bar-wrap">
            <div class="prob-label">${m.home}</div>
            <div class="prob-bar"><div class="prob-fill prob-home" style="width:${homePct}%"></div></div>
            <div class="prob-pct">${homePct}%</div>
          </div>
          <div class="prob-bar-wrap">
            <div class="prob-label">Empate</div>
            <div class="prob-bar"><div class="prob-fill prob-draw" style="width:${drawPct}%"></div></div>
            <div class="prob-pct">${drawPct}%</div>
          </div>
          <div class="prob-bar-wrap">
            <div class="prob-label">${m.away}</div>
            <div class="prob-bar"><div class="prob-fill prob-away" style="width:${awayPct}%"></div></div>
            <div class="prob-pct">${awayPct}%</div>
          </div>
        </div>
        ${topScores.length>0?`<div class="prob-scores">
          <span style="color:var(--muted);font-size:.75rem">Marcadores más populares:</span>
          ${topScores.map(([sc,cnt])=>`<span class="prob-score-tag">${sc} <span>(${cnt})</span></span>`).join("")}
        </div>`:""}
      </div>`;
    });
    html+=`</div>`;
  }

  // Fases eliminatorias si están desbloqueadas
  const elimPhases=[
    {key:"r16",label:"Octavos de Final"},
    {key:"qf",label:"Cuartos de Final"},
    {key:"sf",label:"Semifinales"},
    {key:"tf",label:"Tercer Lugar"},
    {key:"final",label:"Final"}
  ];
  const phases=siteSettings.phases||{};
  elimPhases.forEach(ph=>{
    if(!phases[ph.key]) return;
    const pm=matches.filter(m=>m.phase===ph.key);
    if(!pm.length) return;
    html+=`<div class="card"><div class="card-title">${ph.label}</div>`;
    pm.forEach(m=>{
      const s=matchStats[m.id]||{home:0,draw:0,away:0,scores:{},total:0};
      const tot=s.total||1;
      const homePct=Math.round(s.home/tot*100);
      const drawPct=Math.round(s.draw/tot*100);
      const awayPct=Math.round(s.away/tot*100);
      const topScores=Object.entries(s.scores).sort((a,b)=>b[1]-a[1]).slice(0,3);
      html+=`<div class="prob-match">
        <div class="prob-teams">${f(m.home)} ${m.home} vs ${m.away} ${f(m.away)}</div>
        <div class="prob-date">${m.label||""} — ${s.total} pronósticos</div>
        <div class="prob-bars">
          <div class="prob-bar-wrap">
            <div class="prob-label">${m.home}</div>
            <div class="prob-bar"><div class="prob-fill prob-home" style="width:${homePct}%"></div></div>
            <div class="prob-pct">${homePct}%</div>
          </div>
          <div class="prob-bar-wrap">
            <div class="prob-label">Empate</div>
            <div class="prob-bar"><div class="prob-fill prob-draw" style="width:${drawPct}%"></div></div>
            <div class="prob-pct">${drawPct}%</div>
          </div>
          <div class="prob-bar-wrap">
            <div class="prob-label">${m.away}</div>
            <div class="prob-bar"><div class="prob-fill prob-away" style="width:${awayPct}%"></div></div>
            <div class="prob-pct">${awayPct}%</div>
          </div>
        </div>
        ${topScores.length>0?`<div class="prob-scores">
          <span style="color:var(--muted);font-size:.75rem">Marcadores más populares:</span>
          ${topScores.map(([sc,cnt])=>`<span class="prob-score-tag">${sc} <span>(${cnt})</span></span>`).join("")}
        </div>`:""}
      </div>`;
    });
    html+=`</div>`;
  });

  html+=`</div>`;
  main.innerHTML=html;
}

// ── Notificaciones en tiempo real ────────────────────────────────
// ─────────────────────────────────────────────────────────────────
//  LISTENERS GLOBALES EN TIEMPO REAL
// ─────────────────────────────────────────────────────────────────
function startGlobalListeners(){
  // 1. Listener de configuración del sitio (anuncios, fotos, fases)
  if(settingsListener){settingsListener();settingsListener=null;}
  settingsListener=onSnapshot(doc(db,"settings","site"),(snap)=>{
    if(!snap.exists()) return;
    const newSettings={...siteSettings,...snap.data()};
    const oldAnn=siteSettings.announcement;
    const oldPhases=JSON.stringify(siteSettings.phases||{});
    siteSettings=newSettings;
    applyBg();

    // Actualizar enlace WhatsApp
    const wa=document.getElementById("wa-link");
    if(wa) wa.href=siteSettings.whatsappLink||"#";

    // Notificar si hay anuncio nuevo
    if(newSettings.announcement&&newSettings.announcement!==oldAnn&&oldAnn!==undefined){
      showToast(`📢 ${newSettings.announcement}`,"info");
    }

    // Notificar si se abrió una fase nueva
    const newPhases=siteSettings.phases||{};
    const oldPhasesObj=JSON.parse(oldPhases);
    const phaseNames={r32:"16avos de Final",r16:"Octavos de Final",qf:"Cuartos de Final",sf:"Semifinales",tf:"Tercer Lugar",final:"Gran Final"};
    Object.keys(phaseNames).forEach(k=>{
      if(newPhases[k]&&!oldPhasesObj[k]){
        showToast(`🔓 ¡${phaseNames[k]} desbloqueado! Ya puedes ingresar tus pronósticos.`,"success");
      }
    });

    // Recargar sección actual si es inicio o tabla
    const sec=_currentSection;
    if(sec==="inicio") renderInicio(document.getElementById("main"));
    else if(sec==="tabla") renderTabla(document.getElementById("main"));
  });

  // 2. Listener de partidos (resultados, publicaciones, bloqueos)
  if(notifListener){notifListener();notifListener=null;}
  notifListener=onSnapshot(collection(db,"matches"),(snap)=>{
    const changes=snap.docChanges();
    if(!changes.length) return;

    // Actualizar allMatches globalmente
    allMatches=snap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));

    changes.forEach(change=>{
      if(change.type==="modified"){
        const m=change.doc.data();
        const prev=change.doc.metadata;

        // Notificar resultado oficial nuevo
        if(m.official&&m.official.home!==null&&m.home!=="TBD"&&m.away!=="TBD"){
          // Solo notificar si el resultado cambió (evitar duplicados al cargar)
          if(!prev.hasPendingWrites){
            showToast(`⚽ Resultado: ${m.home} ${m.official.home}—${m.official.away} ${m.away}`,"result");
          }
        }

        // Notificar si un partido/fase fue publicado
        if(m.published===true&&m.home!=="TBD"&&m.away!=="TBD"&&!prev.hasPendingWrites){
          // Solo mostrar si es admin quien recibe (usuarios lo verán al entrar)
          if(!isAdmin&&!isAdmin2){
            showToast(`📋 Nuevos partidos disponibles: ${m.home} vs ${m.away}`,"info");
          }
        }
      }
    });

    // Recargar sección actual automáticamente
    const sec=_currentSection;
    const main=document.getElementById("main");
    if(!main) return;
    if(sec==="tabla") renderTabla(main);
    else if(sec==="stats") renderStats(main);
    else if(sec==="probs") renderProbabilidades(main);
  });
}

function renderGroupSelector(main, myPreds){
  const gMatches=allMatches.filter(m=>m.phase==="groups");
  const groups=[...new Set(gMatches.map(m=>m.group))].sort();

  if(isAdmin||isAdmin2){
    const btns=groups.map(g=>{
      const gm=gMatches.filter(m=>m.group===g);
      const published=gm.filter(m=>m.published===true).length;
      const allPub=published===gm.length;
      return `<button class="group-tile ${allPub?'group-tile-done':published>0?'group-tile-partial':''}" onclick="openGroupAdmin('${g}')">
        <span class="gt-label">Grupo ${g}</span>
        <span class="gt-count">${published}/${gm.length} publicados</span>
      </button>`;
    }).join("");
    main.innerHTML=`<div class="page-wrap">
      <div class="page-header">
        <h2 class="page-title">⚽ Fase de Grupos</h2>
        <button class="btn-pdf-global" onclick="printGruposPDF(true)" title="PDF todos los participantes">💾 PDF</button>
      </div>
      <p style="color:var(--muted);font-size:.82rem;margin-bottom:.75rem">Edita equipos y marcadores, luego presiona <strong>Publicar</strong> para que los usuarios vean el grupo.</p>
      <div class="group-grid">${btns}</div>
    </div>`;
  } else {
    const publishedGroups=groups.filter(g=>gMatches.filter(m=>m.group===g).some(m=>m.published!==false));
    if(!publishedGroups.length){
      main.innerHTML=`<div class="page-wrap">
        <div class="phase-locked-screen">
          <div class="pls-icon">⚽</div>
          <h2 class="pls-title">Fase de Grupos</h2>
          <p class="pls-msg">El administrador aún no ha publicado los partidos. Vuelve más tarde.</p>
        </div>
      </div>`;
      return;
    }
    const btns=publishedGroups.map(g=>{
      const gm=gMatches.filter(m=>m.group===g&&m.published!==false);
      const saved=gm.filter(m=>myPreds[m.id]!==undefined).length;
      const done=saved===gm.length&&gm.length>0;
      return `<button class="group-tile ${done?'group-tile-done':saved>0?'group-tile-partial':''}" onclick="openGroup('${g}')">
        <span class="gt-label">Grupo ${g}</span>
        <span class="gt-count">${saved}/${gm.length} pronósticos</span>
      </button>`;
    }).join("");
    main.innerHTML=`<div class="page-wrap">
      <div class="page-header">
        <h2 class="page-title">⚽ Fase de Grupos</h2>
        <button class="btn-pdf-global" onclick="printGruposPDF(false)" title="Descargar mi comprobante">💾 PDF</button>
      </div>
      <div class="group-grid">${btns}</div>
    </div>`;
  }
}

window.saveMatchEdit=async(id,g)=>{
  const home=document.getElementById("eh_"+id)?.value.trim()||"TBD";
  const away=document.getElementById("ea_"+id)?.value.trim()||"TBD";
  const sh=document.getElementById("sh_"+id)?.value;
  const sa=document.getElementById("sa_"+id)?.value;
  const update={home,away};
  if(sh!==""&&sa!==""&&!isNaN(parseInt(sh))&&!isNaN(parseInt(sa))){
    update.official={home:parseInt(sh),away:parseInt(sa)};
  }
  await updateDoc(doc(db,"matches",id),update);
  showToast("✅ Guardado","success");
  if(g){
    const matchSnap=await getDocs(collection(db,"matches"));
    allMatches=matchSnap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    buildGroupAdminView(document.getElementById("main"),g);
  }
};

window.lockGroup=async(g,state)=>{
  const gm=allMatches.filter(m=>m.group===g);
  await Promise.all(gm.map(m=>updateDoc(doc(db,"matches",m.id),{locked:state})));
  const matchSnap=await getDocs(collection(db,"matches"));
  allMatches=matchSnap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  showToast(`✅ Pronósticos del Grupo ${g} ${state?'cerrados':'abiertos'}`,"success");
  buildGroupAdminView(document.getElementById("main"),g);
};

window.publishGroup=async(g)=>{
  const gm=allMatches.filter(m=>m.group===g);
  await Promise.all(gm.map(m=>{
    const home=document.getElementById("eh_"+m.id)?.value.trim()||m.home;
    const away=document.getElementById("ea_"+m.id)?.value.trim()||m.away;
    const sh=document.getElementById("sh_"+m.id)?.value;
    const sa=document.getElementById("sa_"+m.id)?.value;

    if(sh!==""&&sa!==""&&!isNaN(parseInt(sh))&&!isNaN(parseInt(sa))){
      update.official={home:parseInt(sh),away:parseInt(sa)};

function buildGroupUserView(main,g,myPreds){
  const gm=allMatches.filter(m=>m.group===g&&m.published!==false);
  const saved={};
  gm.forEach(m=>{const he=document.getElementById(`h_${m.id}`);const ae=document.getElementById(`a_${m.id}`);if(he&&ae){saved[m.id]={h:he.value,a:ae.value};}});
  let hasUnsaved=false;
  const rows=gm.map(m=>{
    const pred=myPreds[m.id];
    const locked=m.locked||pred!==undefined;
    const off=m.official;
    let pts=null; if(pred&&off) pts=calcPoints(pred,off);
    const sv=saved[m.id]||{h:"",a:""};
    let inputHtml="";
    if(locked&&pred!==undefined){
      inputHtml=`<div class="pred-result">
        <span class="pred-score-v2">${pred.home} — ${pred.away}</span>
        ${pts!==null?`<span class="pts-badge pts-${pts}">${pts}pt</span>`:""}
        ${off?`<span class="off-score">Oficial: ${off.home}-${off.away}</span>`:""}
      </div>`;
    }else if(m.locked){
      inputHtml=`<div class="locked-badge">🔒 Bloqueado</div>`;
    }else{
      hasUnsaved=true;
      inputHtml=`<div class="score-inputs">
        <input type="number" id="h_${m.id}" min="0" max="20" placeholder="0" class="sinp" value="${sv.h}">
        <span class="sinp-sep">—</span>
        <input type="number" id="a_${m.id}" min="0" max="20" placeholder="0" class="sinp" value="${sv.a}">
      </div>`;
    }
    return `<div class="match-card-v2 ${locked&&pred?'mc-done':''}">
      <div class="mc-teams"><span>${f(m.home)} ${m.home}</span><span class="mc-vs">vs</span><span>${m.away} ${f(m.away)}</span></div>
      <div class="mc-date">📅 ${m.date} ${m.time}</div>
      ${inputHtml}
    </div>`;
  }).join("");
  main.innerHTML=`<div class="page-wrap">
    <div class="page-header">
      <button class="btn-back" onclick="volverGrupos()">‹ Grupos</button>
      <h2 class="page-title">Grupo ${g}</h2>
    </div>
    <div class="matches-v2">${rows}</div>
    ${hasUnsaved?`<button class="btn-save-all" onclick="saveGroupPreds('${g}')">💾 Guardar Grupo ${g}</button>`:""}
  </div>`;
}
window.stopListener=()=>{if(matchesListener){matchesListener();matchesListener=null;}};
window.volverGrupos=()=>{
  stopListener();
  const main=document.getElementById("main");
  renderGroupSelector(main, window._myPreds||{});
};

window.saveGroupPreds=async(g)=>{
  const gm=allMatches.filter(m=>m.group===g&&m.published!==false);
  const ref=doc(db,"predictions",currentUser.uid);
  const snap=await getDoc(ref);
  const existing=snap.exists()?snap.data().preds||{}:{};
  let saved=0;
  for(const m of gm){
    if(existing[m.id]!==undefined||m.locked) continue;
    const h=parseInt(document.getElementById(`h_${m.id}`)?.value);
    const a=parseInt(document.getElementById(`a_${m.id}`)?.value);
    if(!isNaN(h)&&!isNaN(a)){existing[m.id]={home:h,away:a};saved++;}
  }
  if(!saved){showToast("⚠️ Ingresa los marcadores primero","warning");return;}
  await setDoc(ref,{uid:currentUser.uid,preds:existing},{merge:true});
  window._myPreds=existing;
  showToast(`✅ Grupo ${g} guardado`,"success");
  // Regresar al selector de grupos
  stopListener();
  renderGroupSelector(document.getElementById("main"),existing);
};

async function renderTabla(main){
  main.innerHTML=`<div class="page-wrap"><div class="loading-spin"></div></div>`;
  const matchSnap=await getDocs(collection(db,"matches"));
  const sortedM=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  allMatches=sortedM;
  const offMap={}; sortedM.forEach(m=>{
    if(m.official&&m.official.home!==null&&m.official.home!==undefined) offMap[m.id]=m.official;
  });
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={}; usersSnap.forEach(d=>{uMap[d.id]=d.data();});

  // Tabla 1: fase de grupos (published=true O sin campo published para compatibilidad)
  const groupMatches=sortedM.filter(m=>m.phase==="groups"&&m.published!==false);
  // Tabla 2: fases finales publicadas
  const finalPhases=["r32","r16","qf","sf","tf","final"];
  const finalMatches=sortedM.filter(m=>finalPhases.includes(m.phase)&&m.published===true);

  const finalPhaseKeys=["r32","r16","qf","sf","tf","final"];
  function buildLeaderboard(matches, useElim=false){
    const lb=[];
    predsSnap.forEach(d=>{
      const uid=d.id,preds=d.data().preds||{};
      if(!uMap[uid]||uMap[uid].email===ADMIN_EMAIL||uMap[uid].email===ADMIN2_EMAIL) return;
      let pts=0,exact=0;
      const circles=matches.map(m=>{
        const off=offMap[m.id],pred=preds[m.id];
        if(!off) return "pending";
        if(!pred) return "none";
        const p=useElim?calcPointsElim(pred,off):calcPoints(pred,off);
        if(p===null) return "pending";
        if(p>=3){pts+=p;exact++;return "exact";}  // 3pts exacto o 4pts exacto+bono
        if(p===2){pts+=2;return "winner";}         // 1pt empate + 1pt bono penales
        if(p===1){pts+=1;return "winner";}         // 1pt ganador correcto
        return "miss";
      });
      lb.push({uid,name:uMap[uid].displayName||uMap[uid].name||uid,pts,exact,circles});
    });
    return lb.sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
  }

  const lbGroups=buildLeaderboard(groupMatches, false);
  const lbFinal=buildLeaderboard(finalMatches, true);
  window._lb=lbGroups;
  window._lbFinal=lbFinal;
  window._sortedM=groupMatches;
  window._sortedMFinal=finalMatches;

  function buildTableHTML(lb,matches,title){
    if(!matches.length) return "";
    const hdr=matches.map(m=>{
      const h=m.home.length>5?m.home.substring(0,4)+"…":m.home;
      const a=m.away.length>5?m.away.substring(0,4)+"…":m.away;
      return `<th><div class="rot-hdr">${h}-${a}</div></th>`;
    }).join("");
    const rows=lb.map((r,i)=>{
      const cells=r.circles.map((c,idx)=>`<td><span class="dot dot-${c}" title="${matches[idx]?matches[idx].home+' vs '+matches[idx].away:''}"></span></td>`).join("");
      return `<tr class="${i<3?'tr-top-'+i:''}">
        <td class="td-pos">${i+1}</td>
        <td class="td-name">${r.name}</td>
        <td class="td-pts">${r.pts}</td>
        ${cells}
      </tr>`;
    }).join("");
    return `<div class="tabla-card">
      <div class="tabla-card-title">${title}</div>
      <div class="tabla-scroll">
        <table class="tabla-v2">
          <thead><tr>
            <th class="th-sticky" style="left:0;width:35px">#</th>
            <th class="th-sticky th-name" style="left:35px">Participante</th>
            <th class="th-sticky" style="left:155px">Pts</th>
            ${hdr}
          </tr></thead>
          <tbody>${rows||`<tr><td colspan="999" class="td-empty">Sin datos aún</td></tr>`}</tbody>
        </table>
      </div>
    </div>`;
  }

  main.innerHTML=`<div class="tabla-wrap">
    <div class="tabla-header">
      <h2 class="page-title">📊 Tabla</h2>
      <div class="tabla-legend">
        <span><span class="dot dot-exact"></span> 3pts</span>
        <span><span class="dot dot-winner"></span> 1pt</span>
        <span><span class="dot dot-miss"></span> 0pts</span>
        <span><span class="dot dot-pending"></span> Pend.</span>
      </div>
    </div>
    <div class="tabla-tabs">
      <button class="ttab active" id="ttab-grupos" onclick="switchTabla('grupos')">⚽ Grupos</button>
      <button class="ttab" id="ttab-finales" onclick="switchTabla('finales')">🏆 Fases Finales</button>
    </div>
    <div id="tabla-content-grupos">
      <div style="display:flex;justify-content:flex-end;margin-bottom:.5rem">
        <button class="btn-pdf-global" onclick="printTablaV2('groups')">💾 Descargar Tabla de Grupos</button>
      </div>
      ${buildTableHTML(lbGroups, groupMatches, "⚽ Tabla de Grupos")}
    </div>
    <div id="tabla-content-finales" style="display:none">
      <div style="display:flex;justify-content:flex-end;margin-bottom:.5rem">
        <button class="btn-pdf-global" onclick="printTablaV2('final')">💾 Descargar Tabla Fases Finales</button>
      </div>
      ${finalMatches.length?buildTableHTML(lbFinal, finalMatches, "🏆 Tabla de Fases Finales"):'<div class="card center-card" style="margin-top:1rem"><p style="color:var(--muted)">Aún no hay fases finales publicadas.</p></div>'}
    </div>
  </div>`;
}

window.switchTabla=(tab)=>{
  document.getElementById("tabla-content-grupos").style.display=tab==="grupos"?"block":"none";
  document.getElementById("tabla-content-finales").style.display=tab==="finales"?"block":"none";
  document.getElementById("ttab-grupos").classList.toggle("active",tab==="grupos");
  document.getElementById("ttab-finales").classList.toggle("active",tab==="finales");
};


async function renderStats(main){
  main.innerHTML=`<div class="page-wrap"><div class="loading-spin"></div></div>`;
  const matchSnap=await getDocs(collection(db,"matches"));
  const sortedM=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const offMap={};
  sortedM.forEach(m=>{if(m.official&&m.official.home!==null&&m.official.home!==undefined) offMap[m.id]=m.official;});
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={};
  usersSnap.forEach(d=>{uMap[d.id]=d.data();});

  const finalPhaseKeysStats=["r32","r16","qf","sf","tf","final"];
  const stats=[];
  predsSnap.forEach(d=>{
    const uid=d.id,preds=d.data().preds||{};
    if(!uMap[uid]||uMap[uid].email===ADMIN_EMAIL||uMap[uid].email===ADMIN2_EMAIL) return;
    let pts=0,exact=0,winner=0,miss=0,maxStreak=0,curStreak=0,streak=[];
    sortedM.forEach(m=>{
      const off=offMap[m.id],pred=preds[m.id];
      if(!off||!pred){streak.push(null);return;}
      const isElim=finalPhaseKeysStats.includes(m.phase);
      const p=isElim?calcPointsElim(pred,off):calcPoints(pred,off);
      streak.push(p);
      if(p>0){curStreak++;maxStreak=Math.max(maxStreak,curStreak);}else{curStreak=0;}
      if(p>=3){pts+=p;exact++;}
      else if(p===2){pts+=2;winner++;}
      else if(p===1){pts+=1;winner++;}
      else{miss++;}
    });
    const played=exact+winner+miss;
    const pct=played>0?Math.round((exact+winner)/played*100):0;
    stats.push({uid,name:uMap[uid].displayName||uMap[uid].name||uid,pts,exact,winner,miss,maxStreak,pct,played});
  });
  stats.sort((a,b)=>b.pts-a.pts);

  const isMe = uid=>uid===currentUser.uid;
  const myStats=stats.find(s=>s.uid===currentUser.uid);

  let myCard="";
  if(myStats){
    myCard=`<div class="stats-hero-card">
      <div class="shc-name">📊 Mis estadísticas</div>
      <div class="shc-grid">
        <div class="shc-stat"><span class="shc-val">${myStats.pts}</span><span class="shc-lbl">Puntos</span></div>
        <div class="shc-stat"><span class="shc-val" style="color:var(--success)">${myStats.exact}</span><span class="shc-lbl">Exactos</span></div>
        <div class="shc-stat"><span class="shc-val" style="color:var(--warn)">${myStats.winner}</span><span class="shc-lbl">Ganador</span></div>
        <div class="shc-stat"><span class="shc-val" style="color:var(--danger)">${myStats.miss}</span><span class="shc-lbl">Fallidos</span></div>
        <div class="shc-stat"><span class="shc-val" style="color:var(--accent1)">${myStats.maxStreak}</span><span class="shc-lbl">Racha máx.</span></div>
        <div class="shc-stat"><span class="shc-val">${myStats.pct}%</span><span class="shc-lbl">Precisión</span></div>
      </div>
    </div>`;
  }

  const rows=stats.map((s,i)=>`<tr class="${isMe(s.uid)?'tr-me':''}">
    <td>${i+1}</td>
    <td>${s.name}${isMe(s.uid)?' 👤':''}</td>
    <td class="td-pts">${s.pts}</td>
    <td style="color:var(--success)">${s.exact}</td>
    <td style="color:var(--warn)">${s.winner}</td>
    <td style="color:var(--danger)">${s.miss}</td>
    <td style="color:var(--accent1)">${s.maxStreak} 🔥</td>
    <td>${s.pct}%</td>
  </tr>`).join("");

  main.innerHTML=`<div class="page-wrap">
    <h2 class="page-title">📈 Estadísticas</h2>
    ${myCard}
    <div class="card" style="overflow-x:auto">
      <table class="stats-table">
        <thead><tr><th>#</th><th>Nombre</th><th>Pts</th><th>Exactos</th><th>Ganador</th><th>Fallo</th><th>Racha</th><th>%</th></tr></thead>
        <tbody>${rows||`<tr><td colspan="8" class="td-empty">Sin datos aún</td></tr>`}</tbody>
      </table>
    </div>
  </div>`;
}

window.genCodes=async(qty)=>{
  if(!confirm(`¿Generar ${qty} códigos?`)) return;
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let n=0;
  for(let i=0;i<qty;i++){
    let c="";for(let j=0;j<6;j++) c+=chars[Math.floor(Math.random()*chars.length)];
    const s=await getDoc(doc(db,"accessCodes",c));
    if(!s.exists()){await setDoc(doc(db,"accessCodes",c),{used:false,createdAt:serverTimestamp()});n++;}
  }
  showToast(`✅ ${n} códigos generados`,"success"); goTo("admin");
};

window.printGruposPDF=async(adminMode)=>{
  showToast("Generando PDF...","info");
  const matchSnap=await getDocs(collection(db,"matches"));
  const allM=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const groupMatches=allM.filter(m=>m.phase==="groups"&&m.published!==false);
  const groups=[...new Set(groupMatches.map(m=>m.group))].sort();

  if(adminMode){
    const predsSnap=await getDocs(collection(db,"predictions"));
    const usersSnap=await getDocs(collection(db,"users"));
    const uMap={}; usersSnap.forEach(d=>{uMap[d.id]=d.data();});
    const all=[];
    predsSnap.forEach(d=>{
      if(uMap[d.id]&&uMap[d.id].email!==ADMIN_EMAIL&&uMap[d.id].email!==ADMIN2_EMAIL)
        all.push({user:uMap[d.id],preds:d.data().preds||{}});
    });
    all.sort((a,b)=>(a.user.displayName||"").localeCompare(b.user.displayName||""));
    if(!all.length){showToast("No hay participantes aún","warning");return;}
    const pdf=buildGruposPDFDoc(groups,groupMatches,all);
    savePDF(pdf,`quiniela2026_todos_${new Date().toLocaleDateString("es-GT").replace(/\//g,"-")}.pdf`);
  } else {
    const uSnap=await getDoc(doc(db,"users",currentUser.uid));
    const uData=uSnap.exists()?uSnap.data():{};
    const name=uData.displayName||uData.name||currentUser.email;
    const predSnap=await getDoc(doc(db,"predictions",currentUser.uid));
    const preds=predSnap.exists()?predSnap.data().preds||{}:{};
    const entry={user:{...uData,displayName:name},preds};
    const pdf=buildGruposPDFDoc(groups,groupMatches,[entry]);
    savePDF(pdf,`comprobante_grupos_${name.replace(/\s+/g,"_")}.pdf`);
  }
};

function buildGruposPDFDoc(groups,groupMatches,entries){
  const {jsPDF}=window.jspdf;
  // Tamaño oficio (215.9 x 355.6 mm) para que quepan los 12 grupos
  const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:[215.9,355.6]});
  const W=pdf.internal.pageSize.width;
  const H=pdf.internal.pageSize.height;
  const MARGIN=7;
  const GAP=2;
  const COL_W=(W-MARGIN*2-GAP)/2;
  const LEFT=MARGIN;
  const RIGHT=MARGIN+COL_W+GAP;
  const colGroups=[groups.slice(0,6),groups.slice(6)];

  entries.forEach((entry,idx)=>{
    if(idx>0) pdf.addPage();
    const u=entry.user;
    const preds=entry.preds;
    const userName=u.displayName||u.name||u.email||"—";
    const fecha=new Date().toLocaleDateString("es-GT",{day:"2-digit",month:"2-digit",year:"numeric"});

    // HEADER
    pdf.setFillColor(11,22,18);
    pdf.rect(0,0,W,22,"F");
    pdf.setFillColor(201,168,76);
    pdf.rect(0,22,W,1.2,"F");
    pdf.setTextColor(201,168,76);
    pdf.setFont("helvetica","bold");
    pdf.setFontSize(13);
    pdf.text("QUINIELA MUNDIAL 2026",W/2,9,{align:"center"});
    pdf.setFontSize(7.5);
    pdf.setTextColor(180,160,100);
    pdf.text("Comprobante Oficial de Pronósticos — Fase de Grupos",W/2,14.5,{align:"center"});
    pdf.setFontSize(7);
    pdf.setTextColor(140,130,80);
    pdf.text("Canada | Mexico | USA 2026",W/2,19,{align:"center"});

    // INFO PARTICIPANTE
    pdf.setFillColor(20,40,30);
    pdf.rect(0,23.2,W,9,"F");
    pdf.setTextColor(255,255,255);
    pdf.setFont("helvetica","bold");
    pdf.setFontSize(8.5);
    pdf.text(`${userName}`,LEFT,28.5);
    pdf.setFont("helvetica","normal");
    pdf.setFontSize(7);
    pdf.setTextColor(180,180,180);
    pdf.text(`${u.phone||u.email||""}`,LEFT,32.5);
    pdf.setTextColor(201,168,76);
    pdf.text(`Fecha: ${fecha}`,W-LEFT,32.5,{align:"right"});

    // GRUPOS DOS COLUMNAS
    const startY=34;
    [0,1].forEach(col=>{
      let curY=startY+2;
      const x=col===0?LEFT:RIGHT;

      colGroups[col].forEach(g=>{
        const gm=groupMatches.filter(m=>m.group===g);
        if(!gm.length) return;

        // Encabezado grupo
        pdf.setFillColor(26,58,40);
        pdf.rect(x,curY,COL_W,5.5,"F");
        pdf.setDrawColor(201,168,76);
        pdf.setLineWidth(0.3);
        pdf.rect(x,curY,COL_W,5.5,"S");
        pdf.setTextColor(201,168,76);
        pdf.setFont("helvetica","bold");
        pdf.setFontSize(7.5);
        pdf.text(`GRUPO ${g}`,x+COL_W/2,curY+3.8,{align:"center"});
        curY+=5.5;

        // Sub-encabezado columnas
        pdf.setFillColor(15,30,22);
        pdf.rect(x,curY,COL_W,4,"F");
        pdf.setTextColor(150,170,150);
        pdf.setFont("helvetica","normal");
        pdf.setFontSize(5.5);
        pdf.text("LOCAL",x+2,curY+2.8);
        pdf.text("PRONÓSTICO",x+COL_W*0.5,curY+2.8,{align:"center"});
        pdf.text("VISITANTE",x+COL_W-2,curY+2.8,{align:"right"});
        curY+=4;

        // Partidos
        gm.forEach((m,i)=>{
          const pred=preds[m.id];
          const off=m.official;
          const pts=pred&&off&&off.home!==null?calcPoints(pred,off):null;
          // Sin signo ? cuando no hay pronóstico ni resultado aún
          const predTxt=pred?`${pred.home} - ${pred.away}`:"";
          const offTxt=off&&off.home!==null?`${off.home}-${off.away}`:"";

          // Fondo fila
          if(i%2===0) pdf.setFillColor(245,250,247);
          else pdf.setFillColor(255,255,255);
          pdf.rect(x,curY,COL_W,5.5,"F");

          // Barra color izquierda según resultado
          if(pts===3) pdf.setFillColor(46,158,91);
          else if(pts===1) pdf.setFillColor(201,168,76);
          else if(pts===0) pdf.setFillColor(192,57,43);
          else pdf.setFillColor(200,200,200);
          pdf.rect(x,curY,1.5,5.5,"F");

          // Equipo local
          pdf.setFont("helvetica","bold");
          pdf.setFontSize(6);
          pdf.setTextColor(25,25,25);
          pdf.text(m.home.length>11?m.home.substring(0,10)+"…":m.home,x+2.5,curY+2.2);
          // Fecha
          pdf.setFont("helvetica","normal");
          pdf.setFontSize(5);
          pdf.setTextColor(130,130,130);
          const dp=m.date.split("-");
          pdf.text(`${dp[2]}/${dp[1]}`,x+2.5,curY+4.7);

          // Marcador pronóstico (centro) — solo si hay pronóstico
          if(predTxt){
            pdf.setFont("helvetica","bold");
            pdf.setFontSize(8);
            if(pts===3) pdf.setTextColor(22,101,52);
            else if(pts===1) pdf.setTextColor(133,100,4);
            else if(pts===0) pdf.setTextColor(153,27,27);
            else pdf.setTextColor(40,80,55);
            pdf.text(predTxt,x+COL_W/2,curY+3.2,{align:"center"});
          }

          // Resultado oficial pequeño debajo del marcador
          if(offTxt){
            pdf.setFont("helvetica","normal");
            pdf.setFontSize(5);
            pdf.setTextColor(120,120,120);
            pdf.text(`Oficial: ${offTxt}`,x+COL_W/2,curY+5,{align:"center"});
          }

          // Equipo visitante
          pdf.setFont("helvetica","bold");
          pdf.setFontSize(6);
          pdf.setTextColor(25,25,25);
          const awayTxt=m.away.length>11?m.away.substring(0,10)+"…":m.away;
          pdf.text(awayTxt,x+COL_W-1.5,curY+2.2,{align:"right"});

          curY+=5.5;
        });

        // Separador de grupo
        pdf.setDrawColor(201,168,76);
        pdf.setLineWidth(0.2);
        pdf.line(x,curY+0.5,x+COL_W,curY+0.5);
        curY+=3;
      });
    });

    // FOOTER
    pdf.setFillColor(11,22,18);
    pdf.rect(0,H-10,W,10,"F");
    pdf.setFillColor(201,168,76);
    pdf.rect(0,H-10,W,0.8,"F");
    pdf.setTextColor(140,120,80);
    pdf.setFont("helvetica","normal");
    pdf.setFontSize(6);
    pdf.text("Quiniela Mundial 2026 — Comprobante generado automaticamente",W/2,H-5.5,{align:"center"});
    pdf.setTextColor(100,100,100);
    pdf.text("3pts = marcador exacto  |  1pt = ganador correcto  |  0pts = fallo",W/2,H-2,{align:"center"});
  });

  return pdf;
}

window.printResultados=async()=>{
  showToast("Generando PDF...","info");
  const matchSnap=await getDocs(collection(db,"matches"));
  const matches=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={}; usersSnap.forEach(d=>{uMap[d.id]=d.data();});
  const offMap={}; matches.forEach(m=>{if(m.official&&m.official.home!==null&&m.official.home!==undefined) offMap[m.id]=m.official;});
  const finalPhaseKeysPDF=["r32","r16","qf","sf","tf","final"];
  const lb=[];
  predsSnap.forEach(d=>{
    const uid=d.id,preds=d.data().preds||{};
    if(!uMap[uid]||uMap[uid].email===ADMIN_EMAIL||uMap[uid].email===ADMIN2_EMAIL) return;
    let pts=0,exact=0,win=0;
    matches.forEach(m=>{
      const off=offMap[m.id],pred=preds[m.id];
      if(!off||!pred) return;
      const isElim=finalPhaseKeysPDF.includes(m.phase);
      const p=isElim?calcPointsElim(pred,off):calcPoints(pred,off);
      if(p>=3){pts+=p;exact++;}
      else if(p===2){pts+=2;win++;}
      else if(p===1){pts+=1;win++;}
    });
    lb.push({uid,name:uMap[uid].displayName||uMap[uid].name||uid,pts,exact,win});
  });
  lb.sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
  const pdf=getPDF(false);
  pdfHeader(pdf,"QUINIELA MUNDIAL 2026 — Resultados",`${lb.length} participantes | ${matches.filter(m=>m.official).length} partidos jugados`);
  const body=lb.map((r,i)=>[i+1,r.name,r.pts,r.exact,r.win,r.pts-r.exact-r.win<0?0:r.pts-(r.exact*3)-(r.win)]);
  pdf.autoTable({startY:26,head:[["#","Participante","Pts","3pts","1pt","0pts"]],body,styles:{fontSize:8,cellPadding:1.5},headStyles:{fillColor:[26,58,40],textColor:[201,168,76]},columnStyles:{0:{cellWidth:10,halign:"center"},2:{cellWidth:14,halign:"center",fontStyle:"bold"},3:{cellWidth:14,halign:"center"},4:{cellWidth:14,halign:"center"},5:{cellWidth:14,halign:"center"}},didParseCell:(d)=>{if(d.row.index<3&&d.section==="body") d.cell.styles.fillColor=d.row.index===0?[255,248,220]:d.row.index===1?[240,240,240]:[253,243,231];}});
  savePDF(pdf,`resultados_quiniela2026.pdf`);
};

// ── Chat view switcher helper ────────────────────────────────────
function showChatView(viewId){
  ["chat-admin-inbox","chat-convo-view","chat-user-view"].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.style.display = (id===viewId) ? "flex" : "none";
  });
}

// ── Badge listener (unread counts) ──────────────────────────────
function startChatBadgeListener(){
  if(!currentUser) return;

  // Group unread: messages where readBy doesn't include currentUser.uid
  const groupQ = query(collection(db,"chat_group"), orderBy("ts","desc"), limit(50));
  if(chatGroupListener){ chatGroupListener(); chatGroupListener=null; }
  chatGroupListener = onSnapshot(groupQ, snap=>{
    const stored = parseInt(localStorage.getItem("chat_group_read_ts")||"0");
    let count=0;
    snap.forEach(d=>{
      const msg=d.data();
      if(msg.uid!==currentUser.uid && msg.ts && msg.ts.toMillis && msg.ts.toMillis()>stored) count++;
    });
    chatUnreadGroup=count;
    updateChatBadges();
  });

  // Private unread (for current user, messages from admin not yet read)
  if(isAdmin||isAdmin2){
    // Admin: listen to all private threads for any new messages
    startAdminInboxBadge();
  } else {
    const privQ = query(collection(db,"chat_private",currentUser.uid,"messages"), orderBy("ts","desc"), limit(50));
    if(chatPrivateListener){ chatPrivateListener(); chatPrivateListener=null; }
    chatPrivateListener = onSnapshot(privQ, snap=>{
      const stored = parseInt(localStorage.getItem("chat_priv_read_ts_"+currentUser.uid)||"0");
      let count=0;
      snap.forEach(d=>{
        const msg=d.data();
        if(msg.uid!==currentUser.uid && msg.ts && msg.ts.toMillis && msg.ts.toMillis()>stored) count++;
      });
      chatUnreadPrivate=count;
      updateChatBadges();
    });
  }
}

function startAdminInboxBadge(){
  // Listen to the inbox doc which tracks unread counts per thread
  if(chatAdminInboxListener){ chatAdminInboxListener(); chatAdminInboxListener=null; }
  chatAdminInboxListener = onSnapshot(doc(db,"chat_admin_inbox","summary"), snap=>{
    if(!snap.exists()){ chatUnreadPrivate=0; updateChatBadges(); return; }
    const data=snap.data();
    let total=0;
    Object.values(data).forEach(v=>{ if(typeof v==="number") total+=v; });
    chatUnreadPrivate=total;
    updateChatBadges();
  });
}

function updateChatBadges(){
  const total = chatUnreadGroup + chatUnreadPrivate;
  const fab = document.getElementById("chat-fab-badge");
  const sidebarBadge = document.getElementById("sidebar-chat-badge");
  const privBadge = document.getElementById("chat-priv-badge");
  if(fab){ fab.textContent=total>99?"99+":total; fab.style.display=total>0?"flex":"none"; }
  if(sidebarBadge){ sidebarBadge.textContent=total>99?"99+":total; sidebarBadge.style.display=total>0?"inline-flex":"none"; }
  if(privBadge){ privBadge.textContent=chatUnreadPrivate>99?"99+":chatUnreadPrivate; privBadge.style.display=chatUnreadPrivate>0?"inline-flex":"none"; }
}

window.switchChatMode = function(mode){

  document.getElementById("cptab-group").classList.toggle("active", mode==="group");
  document.getElementById("cptab-private").classList.toggle("active", mode==="private");

  if(isAdmin||isAdmin2){

      // Admin: ocultar vistas privadas, mostrar vista de usuario (group usa chat-messages-user)
      showChatView("chat-user-view");
      loadGroupChatAdmin();
    } else {
      showAdminInbox();
    }

    showChatView("chat-user-view");
    if(mode==="group") loadGroupChat();
    else loadPrivateChat(currentUser.uid);

// ── Admin inbox ──────────────────────────────────────────────────
window.showAdminInbox = async function(){
  chatMode="private";
  chatAdminPrivateUid=null;
  document.getElementById("cptab-group").classList.remove("active");
  document.getElementById("cptab-private").classList.add("active");

  showChatView("chat-admin-inbox");

  const list = document.getElementById("chat-inbox-list");
  list.innerHTML=`<div class="chat-loading">Cargando...</div>`;

  try {
    const usersSnap = await getDocs(collection(db,"users"));
    const users=[];
    usersSnap.forEach(d=>{ const data=d.data(); if(data.email!==ADMIN_EMAIL&&data.email!==ADMIN2_EMAIL) users.push({uid:d.id,...data}); });

    if(!users.length){ list.innerHTML=`<div class="chat-empty">Sin participantes</div>`; return; }

    // For each user, get last message & unread count
    const threads = await Promise.all(users.map(async u=>{
      try {
        const q = query(collection(db,"chat_private",u.uid,"messages"), orderBy("ts","desc"), limit(1));
        const snap = await getDocs(q);
        const lastMsg = snap.empty ? null : snap.docs[0].data();
        return { user:u, lastMsg };
      } catch(e){ return { user:u, lastMsg:null }; }
    }));

    threads.sort((a,b)=>{
      const ta = a.lastMsg&&a.lastMsg.ts ? a.lastMsg.ts.toMillis() : 0;
      const tb = b.lastMsg&&b.lastMsg.ts ? b.lastMsg.ts.toMillis() : 0;
      return tb-ta;
    });

    list.innerHTML = threads.map(t=>{
      const name = t.user.displayName||t.user.name||t.user.email||"Usuario";
      const initial = name[0].toUpperCase();
      const preview = t.lastMsg ? (t.lastMsg.text||"").substring(0,40) : "Sin mensajes";
      const time = t.lastMsg&&t.lastMsg.ts ? formatMsgTime(t.lastMsg.ts) : "";
      return `<div class="inbox-item" onclick="adminOpenPrivateChat('${t.user.uid}','${name.replace(/'/g,"\\'")}')">
        <div class="inbox-avatar">${initial}</div>
        <div class="inbox-info">
          <div class="inbox-name">${name}</div>
          <div class="inbox-preview">${preview}</div>
        </div>
        <div class="inbox-time">${time}</div>
      </div>`;
    }).join("");

    if(!threads.length) list.innerHTML=`<div class="chat-empty">Sin conversaciones aún</div>`;
  } catch(e){
    list.innerHTML=`<div class="chat-error">Error al cargar</div>`;
  }
};

// ── Render messages ──────────────────────────────────────────────
function renderMessages(container, snap, mode){
  if(snap.empty){
    const emptyText = mode==="group" ? "¡Sé el primero en escribir en el grupo! 🎉"
      : (isAdmin||isAdmin2) ? "Sin mensajes aún en esta conversación." : "Escribe tu duda al admin 👇";
    container.innerHTML=`<div class="chat-empty">${emptyText}</div>`; return;
  }
  const wasAtBottom = container.scrollHeight - container.clientHeight - container.scrollTop < 60;
  container.innerHTML="";
  snap.forEach(d=>{
    const msg=d.data();
    const isMe = msg.uid===currentUser.uid;
    const isAdminMsg = msg.uid===ADMIN_EMAIL||msg.isAdmin;
    const div=document.createElement("div");
    div.className=`chat-msg ${isMe?"chat-msg-me":"chat-msg-them"} ${isAdminMsg&&!isMe?"chat-msg-admin":""}`;
    const name = isMe?"Tú":(isAdminMsg?"⚙️ Admin":msg.displayName||"?");
    const timeStr = msg.ts ? formatMsgTime(msg.ts) : "";
    div.innerHTML=`
      ${!isMe?`<div class="chat-msg-author">${name}</div>`:""}
      <div class="chat-msg-bubble">
        <span class="chat-msg-text">${escapeHtml(msg.text||"")}</span>
        <span class="chat-msg-time">${timeStr}</span>
      </div>`;
    container.appendChild(div);
  });
  if(wasAtBottom || snap.size<=20) container.scrollTop=container.scrollHeight;
}

// ── Send message ─────────────────────────────────────────────────
window.sendChatMsg = async function(){
  // Determinar qué input usar según el contexto actual
  let inputId;
  if(isAdmin||isAdmin2){
    // Admin: si está en conversación privada (chat-convo-view visible) usa chat-input
    // si está en grupo (chat-user-view visible) usa chat-input-user
    const convoView = document.getElementById("chat-convo-view");
    if(convoView && convoView.style.display === "flex"){
      inputId = "chat-input";
    } else {
      inputId = "chat-input-user";
    }
  } else {
    // Usuario normal siempre usa chat-input-user
    inputId = "chat-input-user";
  }
  
  const input = document.getElementById(inputId);
  if(!input) return;
  const text = (input.value||"").trim();
  if(!text) return;
  input.value="";

  const userSnap = await getDoc(doc(db,"users",currentUser.uid));
  const msgData = {
    uid: currentUser.uid,
    displayName: userSnap.data()?.displayName || currentUser.email,
    isAdmin: isAdmin||isAdmin2,
    text,
    ts: serverTimestamp()
  };

  try {
    if(chatMode==="group"){
      await addDoc(collection(db,"chat_group"), msgData);
      // Update group read ts
      localStorage.setItem("chat_group_read_ts", Date.now().toString());
    } else {
      // Private chat
      const targetUid = (isAdmin||isAdmin2) ? chatAdminPrivateUid : currentUser.uid;
      if(!targetUid){ showToast("Selecciona un usuario primero","error"); return; }
      await addDoc(collection(db,"chat_private",targetUid,"messages"), msgData);

      // Update inbox summary for admin unread tracking
      if(!isAdmin&&!isAdmin2){
        // User sending to admin: increment admin's unread
        const summaryRef = doc(db,"chat_admin_inbox","summary");
        const summarySnap = await getDoc(summaryRef);
        const current = summarySnap.exists() ? (summarySnap.data()[currentUser.uid]||0) : 0;
        await setDoc(summaryRef, {[currentUser.uid]: current+1}, {merge:true});
      } else {
        // Admin replied: mark as read for that thread
        await setDoc(doc(db,"chat_admin_inbox","summary"), {[chatAdminPrivateUid]:0}, {merge:true});
      }
      localStorage.setItem("chat_priv_read_ts_"+targetUid, Date.now().toString());
    }
  } catch(e){
    showToast("Error al enviar mensaje","error");
  }
};

// ── Helpers ──────────────────────────────────────────────────────
function formatMsgTime(ts){
  if(!ts||!ts.toMillis) return "";
  const d=new Date(ts.toMillis());
  const now=new Date();
  const diffDays=Math.floor((now-d)/(1000*60*60*24));
  if(diffDays===0) return d.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
  if(diffDays===1) return "Ayer "+d.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString("es",{day:"2-digit",month:"short"})+" "+d.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
}

function escapeHtml(text){
  return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
