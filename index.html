const ALL_MATCHES=[...GROUP_MATCHES,...ELIM_MATCHES];

async function initMatches(){
  const snap=await getDoc(doc(db,"settings","matchesInit"));
  if(snap.exists()) return;
  await Promise.all(ALL_MATCHES.map(m=>setDoc(doc(db,"matches",m.id),m)));
  await setDoc(doc(db,"settings","matchesInit"),{done:true,ts:serverTimestamp()});
}

async function loadSettings(){
  const snap=await getDoc(doc(db,"settings","site"));
  if(snap.exists()) siteSettings={...siteSettings,...snap.data()};
  else await setDoc(doc(db,"settings","site"),siteSettings);
  applyBg();
}

function applyBg(){
  if(siteSettings.bgImage){
    document.body.style.backgroundImage=`url(${siteSettings.bgImage})`;
    document.body.style.backgroundSize="cover";
    document.body.style.backgroundAttachment="fixed";
  } else {
    document.body.style.backgroundImage="";
    document.body.style.backgroundColor=siteSettings.bg||"#060612";
  }
}

// calcPoints estándar (grupos)
function calcPoints(pred,official){
  if(!official||official.home===null||official.home===undefined) return null;
  const ph=Number(pred.home), pa=Number(pred.away);
  const oh=Number(official.home), oa=Number(official.away);
  if(isNaN(ph)||isNaN(pa)||isNaN(oh)||isNaN(oa)) return 0;
  if(ph===oh&&pa===oa) return 3;
  const pw=ph>pa?"h":ph<pa?"a":"d";
  const ow=oh>oa?"h":oh<oa?"a":"d";
  return pw===ow?1:0;
}

// calcPoints para fases eliminatorias (con bonus de penales)
function calcPointsElim(pred,official){
  if(!official||official.home===null||official.home===undefined) return null;
  // Castear a número para evitar problemas de tipo string
  const ph=Number(pred.home), pa=Number(pred.away);
  const oh=Number(official.home), oa=Number(official.away);
  if(isNaN(ph)||isNaN(pa)||isNaN(oh)||isNaN(oa)) return 0;
  let pts=0;
  const isExact=(ph===oh&&pa===oa);
  const pw=ph>pa?"h":ph<pa?"a":"d";
  const ow=oh>oa?"h":oh<oa?"a":"d";
  if(isExact) pts=3;
  else if(pw===ow) pts=1;
  // Bono +1: empate oficial + usuario predijo empate + acertó clasificado en penales
  if(ow==="d"&&pw==="d"&&official.penaltyWinner&&pred.penaltyWinner){
    if(pred.penaltyWinner===official.penaltyWinner) pts+=1;
  }
  return pts;
}

  t.className=`toast toast-${type}`;
  t.textContent=msg;
  document.getElementById("toast-container").appendChild(t);

window.submitGateCode=async()=>{
  const code=document.getElementById("gate-code").value.trim().toUpperCase();
  const err=document.getElementById("gate-err");
  if(!code){err.textContent="Ingresa el código.";return;}
  err.textContent="Verificando..."; err.style.color="var(--c3)";
  const snap=await getDoc(doc(db,"accessCodes",code));
  if(!snap.exists()){err.textContent="❌ Código inválido.";err.style.color="var(--danger)";return;}
  if(snap.data().used){err.textContent="❌ Código ya utilizado.";err.style.color="var(--danger)";return;}
  const uSnap=await getDoc(doc(db,"users",currentUser.uid));
  const uData=uSnap.exists()?uSnap.data():{};
  await Promise.all([
    updateDoc(doc(db,"users",currentUser.uid),{accessCode:code,verified:true}),
    updateDoc(doc(db,"accessCodes",code),{used:true,usedBy:uData.displayName||"",usedAt:serverTimestamp()})
  ]);
  err.textContent="✅ ¡Acceso concedido!"; err.style.color="var(--success)";
  setTimeout(()=>renderApp(),800);
};

async function renderFaseElim(main,phaseKey){
  if(isAdmin||isAdmin2){renderFaseElimAdmin(main,phaseKey);return;}
  main.innerHTML=`<div class="page-wrap"><div class="loading-spin"></div></div>`;
  const label=PHASE_LABELS[phaseKey]||phaseKey;
  const phases=siteSettings.phases||{};

  if(!phases[phaseKey]){
    main.innerHTML=`<div class="page-wrap">
      <div class="phase-locked-screen">
        <div class="pls-icon">🔒</div>
        <h2 class="pls-title">${label}</h2>
        <p class="pls-msg">Esta fase aún no está disponible.<br>El administrador la desbloqueará cuando sea el momento.</p>
      </div>
    </div>`;
    return;
  }

  const matchSnap=await getDocs(collection(db,"matches"));
  allMatches=matchSnap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const predSnap=await getDoc(doc(db,"predictions",currentUser.uid));
  const myPreds=predSnap.exists()?predSnap.data().preds||{}:{};
  window._myPreds=myPreds;

  if(matchesListener){matchesListener();matchesListener=null;}
  matchesListener=onSnapshot(collection(db,"matches"),(snap)=>{
    allMatches=snap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    buildElimView(main,phaseKey,label,window._myPreds);
  });
}

function buildElimView(main,phaseKey,label,myPreds){
  const pm=allMatches.filter(m=>m.phase===phaseKey&&m.published===true);
  if(!pm.length){
    main.innerHTML=`<div class="page-wrap">
      <div class="phase-locked-screen">
        <div class="pls-icon">⏳</div>
        <h2 class="pls-title">${label}</h2>
        <p class="pls-msg">El administrador aún no ha publicado los partidos de esta fase.</p>
      </div>
    </div>`;
    return;
  }
  const saved={};
  pm.forEach(m=>{
    const he=document.getElementById(`h_${m.id}`);
    const ae=document.getElementById(`a_${m.id}`);
    if(he&&ae){saved[m.id]={h:he.value,a:ae.value};}
  });
  let hasUnsaved=false;
  let rows=pm.map(m=>{
    const pred=myPreds[m.id];
    const locked=m.locked||pred!==undefined;
    const off=m.official;
    let pts=null;
    if(pred&&off) pts=calcPointsElim(pred,off);
    const sv=saved[m.id]||{h:"",a:""};
    let inputHtml="";

    if(locked&&pred!==undefined){
      // Mostrar pronóstico guardado
      const isDrawPred=pred.home===pred.away;
      const penWinner=pred.penaltyWinner||null;
      inputHtml=`<div class="pred-result">
        <span class="pred-score-v2">${pred.home} — ${pred.away}${isDrawPred&&penWinner?` <span class="pen-winner-badge">🏆 ${penWinner}</span>`:''}</span>
        ${pts!==null?`<span class="pts-badge pts-${Math.min(pts,3)}">${pts}pt${pts===4?'s':''}</span>`:""}
        ${off?`<span class="off-score">Oficial: ${off.home}-${off.away}${off.penaltyWinner?' ('+off.penaltyWinner+' pens)':''}</span>`:""}
      </div>`;
    } else if(m.locked){
      inputHtml=`<div class="locked-badge">🔒 Bloqueado</div>`;
    } else if(m.home==="TBD"||m.away==="TBD"){
      inputHtml=`<div class="locked-badge">⏳ Equipos por definir</div>`;
    } else {
      hasUnsaved=true;
      // Input con detección de empate → abre modal
      const penStored=window._elimPenals?.[m.id];
      inputHtml=`<div class="score-inputs">
        <input type="number" id="h_${m.id}" min="0" max="20" placeholder="0" class="sinp" value="${sv.h}"
          oninput="checkElimDraw('${m.id}','${m.home}','${m.away}')">
        <span class="sinp-sep">—</span>
        <input type="number" id="a_${m.id}" min="0" max="20" placeholder="0" class="sinp" value="${sv.a}"
          oninput="checkElimDraw('${m.id}','${m.home}','${m.away}')">
        ${penStored?`<span class="pen-chip">🏆 ${penStored}</span>`:`<button class="btn-xs btn-pen" onclick="openPenalModal('${m.id}','${m.home}','${m.away}')">⚽ Empate?</button>`}
      </div>`;
    }
    return `<div class="match-card-v2 mc-elim ${locked&&pred?'mc-done':''}" id="mc_${m.id}">
      <div class="mc-elim-label">${m.label}</div>
      <div class="mc-teams"><span>${f(m.home)} ${m.home}</span><span class="mc-vs">vs</span><span>${m.away} ${f(m.away)}</span></div>
      <div class="mc-date">📅 ${m.date} ${m.time}</div>
      ${inputHtml}
    </div>`;
  }).join("");

  main.innerHTML=`<div class="page-wrap">
    <h2 class="page-title">${label}</h2>
    <p style="color:var(--muted);font-size:.8rem;margin-bottom:.75rem">💡 Si predices empate, selecciona el marcador exacto y quién clasifica en penales para ganar el bono de +1pt.</p>
    <div class="matches-v2">${rows}</div>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.5rem">
      ${hasUnsaved?`<button class="btn-save-all" style="flex:2;margin-top:0" onclick="saveElimPreds('${phaseKey}')">💾 Guardar pronósticos</button>`:""}
      <button class="btn-sm" style="flex:1" onclick="printMisFasePDF('${phaseKey}','${label}')">💾 Mi comprobante PDF</button>
    </div>
  </div>
  <!-- Modal de penales -->
  <div id="penal-overlay" class="penal-overlay" style="display:none" onclick="closePenalModal()">
    <div class="penal-modal" onclick="event.stopPropagation()">
      <div class="penal-modal-title">⚽ EMPATE — <span id="pm-phase"></span></div>
      <p class="penal-modal-sub">Confirma el marcador exacto del empate:</p>
      <select id="pm-score" class="penal-score-sel">
        ${[...Array(9)].map((_,i)=>`<option value="${i}-${i}">${i} - ${i}</option>`).join("")}
      </select>
      <p class="penal-modal-sub" style="margin-top:1rem">¿Quién clasifica en penales?</p>
      <div class="penal-teams">
        <button class="penal-team-btn" id="pb-home" onclick="selectPenalWinner('home')">
          <span id="pb-home-flag"></span>
          <span id="pb-home-name"></span>
        </button>
        <button class="penal-team-btn" id="pb-away" onclick="selectPenalWinner('away')">
          <span id="pb-away-flag"></span>
          <span id="pb-away-name"></span>
        </button>
      </div>
      <button class="btn-save-all" style="margin-top:1rem" onclick="confirmPenal()">✅ Confirmar y Guardar</button>
    </div>
  </div>`;
}

// Variables para el modal de penales
if(!window._elimPenals) window._elimPenals={};
let _penalMatchId=null, _penalHome=null, _penalAway=null, _penalWinner=null;

window.checkElimDraw=(id,home,away)=>{
  const h=parseInt(document.getElementById(`h_${id}`)?.value);
  const a=parseInt(document.getElementById(`a_${id}`)?.value);
  if(!isNaN(h)&&!isNaN(a)&&h===a){
    openPenalModal(id,home,away,h);
  }
};

window.openPenalModal=(id,home,away,score)=>{
  _penalMatchId=id; _penalHome=home; _penalAway=away; _penalWinner=null;
  const h=score??parseInt(document.getElementById(`h_${id}`)?.value)??0;
  document.getElementById("pm-phase").textContent=`${home} vs ${away}`;
  const sel=document.getElementById("pm-score");
  if(sel&&!isNaN(h)) sel.value=`${h}-${h}`;
  document.getElementById("pb-home-flag").textContent=f(home);
  document.getElementById("pb-home-name").textContent=home;
  document.getElementById("pb-away-flag").textContent=f(away);
  document.getElementById("pb-away-name").textContent=away;
  document.getElementById("pb-home").classList.remove("selected");
  document.getElementById("pb-away").classList.remove("selected");
  // Si ya tenía ganador guardado, marcarlo
  const prev=window._elimPenals[id];
  if(prev){
    _penalWinner=prev;
    document.getElementById(prev===home?"pb-home":"pb-away").classList.add("selected");
  }

window.confirmPenal=()=>{
  if(!_penalWinner){showToast("⚠️ Selecciona quién clasifica","warning");return;}
  const scoreVal=document.getElementById("pm-score").value;
  const[sh,sa]=scoreVal.split("-").map(Number);
  // Actualizar inputs de marcador
  const hi=document.getElementById(`h_${_penalMatchId}`);
  const ai=document.getElementById(`a_${_penalMatchId}`);
  if(hi) hi.value=sh;
  if(ai) ai.value=sa;
  // Guardar ganador local
  window._elimPenals[_penalMatchId]=_penalWinner;
  closePenalModal();
  showToast(`✅ Empate ${sh}-${sa}, clasifica ${_penalWinner}`,"success");

  const btn=document.querySelector(`#mc_${_penalMatchId} .btn-pen`);

window.saveElimPreds=async(phaseKey)=>{
  const pm=allMatches.filter(m=>m.phase===phaseKey&&m.published===true);
  const ref=doc(db,"predictions",currentUser.uid);
  const snap=await getDoc(ref);
  const existing=snap.exists()?snap.data().preds||{}:{};
  let saved=0;
  for(const m of pm){
    if(existing[m.id]!==undefined||m.locked||m.home==="TBD"||m.away==="TBD") continue;
    const h=parseInt(document.getElementById(`h_${m.id}`)?.value);
    const a=parseInt(document.getElementById(`a_${m.id}`)?.value);
    if(isNaN(h)||isNaN(a)) continue;
    const pred={home:h,away:a};
    // Si fue empate, guardar ganador de penales
    if(h===a&&window._elimPenals[m.id]){
      pred.penaltyWinner=window._elimPenals[m.id];
    }
    existing[m.id]=pred;
    saved++;
  }
  if(!saved){showToast("⚠️ Ingresa los marcadores primero","warning");return;}
  await setDoc(ref,{uid:currentUser.uid,preds:existing},{merge:true});
  window._myPreds=existing;
  window._elimPenals={};
  showToast(`✅ ${saved} pronósticos guardados`,"success");
  // Recargar vista
  buildElimView(document.getElementById("main"),phaseKey,PHASE_LABELS[phaseKey]||phaseKey,existing);
};

window.printFasePDF=async(phaseKey, groupFilter)=>{
  showToast("Generando PDF...","info");
  const matchSnap=await getDocs(collection(db,"matches"));
  const allM=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={}; usersSnap.forEach(d=>{uMap[d.id]=d.data();});
  const all=[]; predsSnap.forEach(d=>{
    if(uMap[d.id]&&uMap[d.id].email!==ADMIN_EMAIL&&uMap[d.id].email!==ADMIN2_EMAIL)
      all.push({user:uMap[d.id],preds:d.data().preds||{}});
  });
  all.sort((a,b)=>(a.user.displayName||"").localeCompare(b.user.displayName||""));

  // Filtrar partidos de la fase
  let matches;
  if(phaseKey==="groups"){
    matches=allM.filter(m=>m.phase==="groups"&&(!groupFilter||m.group===groupFilter)&&m.published!==false);
  } else {
    matches=allM.filter(m=>m.phase===phaseKey&&m.published===true);
  }
  if(!matches.length){showToast("No hay partidos publicados en esta fase","warning");return;}

  const phaseLabel=phaseKey==="groups"?`Fase de Grupos ${groupFilter||''}`:PHASE_LABELS[phaseKey]||phaseKey;
  const pdf=getPDF(false);
  const W=pdf.internal.pageSize.width;

  all.forEach((entry,idx)=>{
    if(idx>0) pdf.addPage();
    const u=entry.user;
    pdfHeader(pdf,`QUINIELA MUNDIAL 2026 — ${phaseLabel}`,`${u.displayName||u.name} | ${u.phone||u.email}`);
    const body=matches.map(m=>{
      const pred=entry.preds[m.id];
      const off=m.official;
      const pts=pred&&off?(phaseKey==="groups"?calcPoints(pred,off):calcPointsElim(pred,off)):"-";
      const predStr=pred?`${pred.home}-${pred.away}${pred.penaltyWinner?' ('+pred.penaltyWinner+')':''}`:"?";
      const offStr=off?`${off.home}-${off.away}${off.penaltyWinner?' ('+off.penaltyWinner+')':''}`:"—";
      return [m.label||`${m.home} vs ${m.away}`,predStr,offStr,pts!==null&&pts!=="-"?`${pts}pt`:"—"];
    });
    pdf.autoTable({
      startY:26,
      head:[["Partido","Mi pronóstico","Oficial","Pts"]],
      body,
      styles:{fontSize:7.5,cellPadding:1.5},
      headStyles:{fillColor:[26,58,40],textColor:[201,168,76]},
      columnStyles:{0:{cellWidth:70},1:{cellWidth:35,halign:"center"},2:{cellWidth:35,halign:"center"},3:{cellWidth:20,halign:"center",fontStyle:"bold"}}
    });
  });
  const fname=`pronosticos_${phaseKey}${groupFilter?"_grupo"+groupFilter:""}_${new Date().toLocaleDateString("es-GT").replace(/\//g,"-")}.pdf`;
  savePDF(pdf,fname);
};

window.publishPhase=async(phaseKey)=>{
  const pm=allMatches.filter(m=>m.phase===phaseKey);
  await Promise.all(pm.map(m=>{
    const home=document.getElementById("eh_"+m.id)?.value.trim()||(m.home==="TBD"?"TBD":m.home);
    const away=document.getElementById("ea_"+m.id)?.value.trim()||(m.away==="TBD"?"TBD":m.away);
    const sh=document.getElementById("sh_"+m.id)?.value;
    const sa=document.getElementById("sa_"+m.id)?.value;
    const pw=document.getElementById("pw_"+m.id)?.value||"";
    const update={home,away,published:true};
    if(sh!==""&&sa!==""&&!isNaN(parseInt(sh))&&!isNaN(parseInt(sa))){
      const official={home:parseInt(sh),away:parseInt(sa)};
      // Preservar penaltyWinner: usar el del input, o el ya guardado en Firestore
      if(parseInt(sh)===parseInt(sa)){
        official.penaltyWinner=pw||(m.official?.penaltyWinner||"");
      } else {
        official.penaltyWinner=""; // No aplica si no hubo empate
      }
      update.official=official;
    } else if(m.official){
      // Si no se tocó el marcador, preservar el oficial ya guardado
      update.official=m.official;
    }
    return updateDoc(doc(db,"matches",m.id),update);
  }));
  const matchSnap=await getDocs(collection(db,"matches"));
  allMatches=matchSnap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  showToast(`✅ ${PHASE_LABELS[phaseKey]} publicada`,"success");
  renderFaseElimAdmin(document.getElementById("main"),phaseKey);
};

async function renderProbabilidades(main){
  main.innerHTML=`<div class="page-wrap"><div class="loading-spin"></div></div>`;
  const matchSnap=await getDocs(collection(db,"matches"));
  const matches=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={}; usersSnap.forEach(d=>{uMap[d.id]=d.data();});

  // Calcular estadísticas por partido
  const matchStats={};
  matches.forEach(m=>{matchStats[m.id]={home:0,draw:0,away:0,scores:{},total:0};});

  predsSnap.forEach(d=>{
    const uid=d.id,preds=d.data().preds||{};
    if(!uMap[uid]||uMap[uid].email===ADMIN_EMAIL||uMap[uid].email===ADMIN2_EMAIL) return;
    Object.entries(preds).forEach(([mid,pred])=>{
      if(!matchStats[mid]) return;
      const s=matchStats[mid];
      s.total++;
      if(pred.home>pred.away) s.home++;
      else if(pred.home<pred.away) s.away++;
      else s.draw++;
      const key=`${pred.home}-${pred.away}`;
      s.scores[key]=(s.scores[key]||0)+1;
    });
  });

  const groups=[...new Set(matches.filter(m=>m.phase==="groups").map(m=>m.group))].sort();

  let html=`<div class="page-wrap">
    <h2 class="page-title">🎯 Probabilidades</h2>
    <p style="color:var(--muted);font-size:.85rem;margin-top:-.5rem">Distribución de pronósticos de todos los participantes por partido.</p>`;

  for(const g of groups){
    const gMatches=matches.filter(m=>m.group===g);
    html+=`<div class="card"><div class="card-title">Grupo ${g}</div>`;
    gMatches.forEach(m=>{
      const s=matchStats[m.id]||{home:0,draw:0,away:0,scores:{},total:0};
      const tot=s.total||1;
      const homePct=Math.round(s.home/tot*100);
      const drawPct=Math.round(s.draw/tot*100);
      const awayPct=Math.round(s.away/tot*100);
      // Top 3 marcadores
      const topScores=Object.entries(s.scores).sort((a,b)=>b[1]-a[1]).slice(0,3);
      html+=`<div class="prob-match">
        <div class="prob-teams">${f(m.home)} ${m.home} vs ${m.away} ${f(m.away)}</div>
        <div class="prob-date">${m.date} — ${s.total} pronósticos</div>
        <div class="prob-bars">
          <div class="prob-bar-wrap">
            <div class="prob-label">${m.home}</div>
            <div class="prob-bar"><div class="prob-fill prob-home" style="width:${homePct}%"></div></div>
            <div class="prob-pct">${homePct}%</div>
          </div>
          <div class="prob-bar-wrap">
            <div class="prob-label">Empate</div>
            <div class="prob-bar"><div class="prob-fill prob-draw" style="width:${drawPct}%"></div></div>
            <div class="prob-pct">${drawPct}%</div>
          </div>
          <div class="prob-bar-wrap">
            <div class="prob-label">${m.away}</div>
            <div class="prob-bar"><div class="prob-fill prob-away" style="width:${awayPct}%"></div></div>
            <div class="prob-pct">${awayPct}%</div>
          </div>
        </div>
        ${topScores.length>0?`<div class="prob-scores">
          <span style="color:var(--muted);font-size:.75rem">Marcadores más populares:</span>
          ${topScores.map(([sc,cnt])=>`<span class="prob-score-tag">${sc} <span>(${cnt})</span></span>`).join("")}
        </div>`:""}
      </div>`;
    });
    html+=`</div>`;
  }

  // Fases eliminatorias si están desbloqueadas
  const elimPhases=[
    {key:"r16",label:"Octavos de Final"},
    {key:"qf",label:"Cuartos de Final"},
    {key:"sf",label:"Semifinales"},
    {key:"tf",label:"Tercer Lugar"},
    {key:"final",label:"Final"}
  ];
  const phases=siteSettings.phases||{};
  elimPhases.forEach(ph=>{
    if(!phases[ph.key]) return;
    const pm=matches.filter(m=>m.phase===ph.key);
    if(!pm.length) return;
    html+=`<div class="card"><div class="card-title">${ph.label}</div>`;
    pm.forEach(m=>{
      const s=matchStats[m.id]||{home:0,draw:0,away:0,scores:{},total:0};
      const tot=s.total||1;
      const homePct=Math.round(s.home/tot*100);
      const drawPct=Math.round(s.draw/tot*100);
      const awayPct=Math.round(s.away/tot*100);
      const topScores=Object.entries(s.scores).sort((a,b)=>b[1]-a[1]).slice(0,3);
      html+=`<div class="prob-match">
        <div class="prob-teams">${f(m.home)} ${m.home} vs ${m.away} ${f(m.away)}</div>
        <div class="prob-date">${m.label||""} — ${s.total} pronósticos</div>
        <div class="prob-bars">
          <div class="prob-bar-wrap">
            <div class="prob-label">${m.home}</div>
            <div class="prob-bar"><div class="prob-fill prob-home" style="width:${homePct}%"></div></div>

// ── Notificaciones en tiempo real ────────────────────────────────
// ─────────────────────────────────────────────────────────────────
//  LISTENERS GLOBALES EN TIEMPO REAL
// ─────────────────────────────────────────────────────────────────
function startGlobalListeners(){
  // 1. Listener de configuración del sitio (anuncios, fotos, fases)
  if(settingsListener){settingsListener();settingsListener=null;}
  settingsListener=onSnapshot(doc(db,"settings","site"),(snap)=>{
    if(!snap.exists()) return;
    const newSettings={...siteSettings,...snap.data()};
    const oldAnn=siteSettings.announcement;
    const oldPhases=JSON.stringify(siteSettings.phases||{});
    siteSettings=newSettings;
    applyBg();

    // Actualizar enlace WhatsApp
    const wa=document.getElementById("wa-link");
    if(wa) wa.href=siteSettings.whatsappLink||"#";

    // Notificar si hay anuncio nuevo
    if(newSettings.announcement&&newSettings.announcement!==oldAnn&&oldAnn!==undefined){
      showToast(`📢 ${newSettings.announcement}`,"info");
    }

    // Notificar si se abrió una fase nueva
    const newPhases=siteSettings.phases||{};
    const oldPhasesObj=JSON.parse(oldPhases);
    const phaseNames={r32:"16avos de Final",r16:"Octavos de Final",qf:"Cuartos de Final",sf:"Semifinales",tf:"Tercer Lugar",final:"Gran Final"};
    Object.keys(phaseNames).forEach(k=>{
      if(newPhases[k]&&!oldPhasesObj[k]){
        showToast(`🔓 ¡${phaseNames[k]} desbloqueado! Ya puedes ingresar tus pronósticos.`,"success");
      }
    });

    // Recargar sección actual si es inicio o tabla
    const sec=_currentSection;
    if(sec==="inicio") renderInicio(document.getElementById("main"));
    else if(sec==="tabla") renderTabla(document.getElementById("main"));
  });

  // 2. Listener de partidos (resultados, publicaciones, bloqueos)
  if(notifListener){notifListener();notifListener=null;}
  notifListener=onSnapshot(collection(db,"matches"),(snap)=>{
    const changes=snap.docChanges();
    if(!changes.length) return;

    // Actualizar allMatches globalmente
    allMatches=snap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));

    changes.forEach(change=>{
      if(change.type==="modified"){
        const m=change.doc.data();
        const prev=change.doc.metadata;

        // Notificar resultado oficial nuevo
        if(m.official&&m.official.home!==null&&m.home!=="TBD"&&m.away!=="TBD"){
          // Solo notificar si el resultado cambió (evitar duplicados al cargar)
          if(!prev.hasPendingWrites){
            showToast(`⚽ Resultado: ${m.home} ${m.official.home}—${m.official.away} ${m.away}`,"result");
          }
        }

        // Notificar si un partido/fase fue publicado
        if(m.published===true&&m.home!=="TBD"&&m.away!=="TBD"&&!prev.hasPendingWrites){
          // Solo mostrar si es admin quien recibe (usuarios lo verán al entrar)
          if(!isAdmin&&!isAdmin2){
            showToast(`📋 Nuevos partidos disponibles: ${m.home} vs ${m.away}`,"info");
          }
        }
      }
    });

    // Recargar sección actual automáticamente
    const sec=_currentSection;
    const main=document.getElementById("main");
    if(!main) return;
    if(sec==="tabla") renderTabla(main);
    else if(sec==="stats") renderStats(main);
    else if(sec==="probs") renderProbabilidades(main);
  });
}

    const h=parseInt(document.getElementById(`h_${m.id}`)?.value);

  renderGroupSelector(document.getElementById("main"),existing);
};

// ═════════════════════════════════════════════════════════════════
async function renderTabla(main){
  main.innerHTML=`<div class="page-wrap"><div class="loading-spin"></div></div>`;
  const matchSnap=await getDocs(collection(db,"matches"));
  const sortedM=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  allMatches=sortedM;
  const offMap={}; sortedM.forEach(m=>{
    if(m.official&&m.official.home!==null&&m.official.home!==undefined) offMap[m.id]=m.official;
  });
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={}; usersSnap.forEach(d=>{uMap[d.id]=d.data();});

  // Tabla 1: fase de grupos (published=true O sin campo published para compatibilidad)
  const groupMatches=sortedM.filter(m=>m.phase==="groups"&&m.published!==false);
  // Tabla 2: fases finales publicadas
  const finalPhases=["r32","r16","qf","sf","tf","final"];
  const finalMatches=sortedM.filter(m=>finalPhases.includes(m.phase)&&m.published===true);

  const finalPhaseKeys=["r32","r16","qf","sf","tf","final"];
  function buildLeaderboard(matches, useElim=false){
    const lb=[];
    predsSnap.forEach(d=>{
      const uid=d.id,preds=d.data().preds||{};
      if(!uMap[uid]||uMap[uid].email===ADMIN_EMAIL||uMap[uid].email===ADMIN2_EMAIL) return;
      let pts=0,exact=0;
      const circles=matches.map(m=>{
        const off=offMap[m.id],pred=preds[m.id];
        if(!off) return "pending";
        if(!pred) return "none";
        const p=useElim?calcPointsElim(pred,off):calcPoints(pred,off);
        if(p>=3){pts+=p;exact++;return "exact";}
        if(p===1){pts+=1;return "winner";}
        return "miss";
      });
      lb.push({uid,name:uMap[uid].displayName||uMap[uid].name||uid,pts,exact,circles});
    });
    return lb.sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
  }

  const lbGroups=buildLeaderboard(groupMatches, false);
  const lbFinal=buildLeaderboard(finalMatches, true);
  window._lb=lbGroups;
  window._lbFinal=lbFinal;
  window._sortedM=groupMatches;
  window._sortedMFinal=finalMatches;

  function buildTableHTML(lb,matches,title){
    if(!matches.length) return "";
    const hdr=matches.map(m=>{
      const h=m.home.length>5?m.home.substring(0,4)+"…":m.home;
      const a=m.away.length>5?m.away.substring(0,4)+"…":m.away;
      return `<th><div class="rot-hdr">${h}-${a}</div></th>`;
    }).join("");
    const rows=lb.map((r,i)=>{
      const cells=r.circles.map((c,idx)=>`<td><span class="dot dot-${c}" title="${matches[idx]?matches[idx].home+' vs '+matches[idx].away:''}"></span></td>`).join("");
      return `<tr class="${i<3?'tr-top-'+i:''}">
        <td class="td-pos">${i+1}</td>
        <td class="td-name">${r.name}</td>
        <td class="td-pts">${r.pts}</td>
        ${cells}
      </tr>`;
    }).join("");
    return `<div class="tabla-card">
      <div class="tabla-card-title">${title}</div>
      <div class="tabla-scroll">
        <table class="tabla-v2">
          <thead><tr>
            <th class="th-sticky" style="left:0;width:35px">#</th>
            <th class="th-sticky th-name" style="left:35px">Participante</th>
            <th class="th-sticky" style="left:155px">Pts</th>
            ${hdr}
          </tr></thead>
          <tbody>${rows||`<tr><td colspan="999" class="td-empty">Sin datos aún</td></tr>`}</tbody>
        </table>
      </div>
    </div>`;
  }

  main.innerHTML=`<div class="tabla-wrap">
    <div class="tabla-header">
      <h2 class="page-title">📊 Tabla</h2>
      <div class="tabla-legend">
        <span><span class="dot dot-exact"></span> 3pts</span>
        <span><span class="dot dot-winner"></span> 1pt</span>
        <span><span class="dot dot-miss"></span> 0pts</span>
        <span><span class="dot dot-pending"></span> Pend.</span>
      </div>
      <button class="btn-icon" onclick="printTablaV2()" title="Guardar PDF">💾</button>
    </div>
    <div class="tabla-tabs">
      <button class="ttab active" id="ttab-grupos" onclick="switchTabla('grupos')">⚽ Grupos</button>
      <button class="ttab" id="ttab-finales" onclick="switchTabla('finales')">🏆 Fases Finales</button>
    </div>
    <div id="tabla-content-grupos">${buildTableHTML(lbGroups, groupMatches, "⚽ Tabla de Grupos")}</div>
    <div id="tabla-content-finales" style="display:none">${finalMatches.length?buildTableHTML(lbFinal, finalMatches, "🏆 Tabla de Fases Finales"):'<div class="card center-card" style="margin-top:1rem"><p style="color:var(--muted)">Aún no hay fases finales publicadas.</p></div>'}</div>
  </div>`;
}

async function renderStats(main){
  main.innerHTML=`<div class="page-wrap"><div class="loading-spin"></div></div>`;
  const matchSnap=await getDocs(collection(db,"matches"));
  const sortedM=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const offMap={};
  sortedM.forEach(m=>{if(m.official&&m.official.home!==null&&m.official.home!==undefined) offMap[m.id]=m.official;});
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={};
  usersSnap.forEach(d=>{uMap[d.id]=d.data();});

  const stats=[];
  predsSnap.forEach(d=>{
    const uid=d.id,preds=d.data().preds||{};
    if(!uMap[uid]||uMap[uid].email===ADMIN_EMAIL||uMap[uid].email===ADMIN2_EMAIL) return;
    let pts=0,exact=0,winner=0,miss=0,maxStreak=0,curStreak=0,streak=[];
    sortedM.forEach(m=>{
      const off=offMap[m.id],pred=preds[m.id];
      if(!off||!pred){streak.push(null);return;}
      const p=calcPoints(pred,off);
      streak.push(p);
      if(p>0){curStreak++;maxStreak=Math.max(maxStreak,curStreak);}else{curStreak=0;}
      if(p===3){pts+=3;exact++;}else if(p===1){pts+=1;winner++;}else{miss++;}
    });
    const played=exact+winner+miss;
    const pct=played>0?Math.round((exact+winner)/played*100):0;
    stats.push({uid,name:uMap[uid].displayName||uMap[uid].name||uid,pts,exact,winner,miss,maxStreak,pct,played});
  });
  stats.sort((a,b)=>b.pts-a.pts);

  const isMe = uid=>uid===currentUser.uid;
  const myStats=stats.find(s=>s.uid===currentUser.uid);

  let myCard="";
  if(myStats){
    myCard=`<div class="stats-hero-card">
      <div class="shc-name">📊 Mis estadísticas</div>
      <div class="shc-grid">
        <div class="shc-stat"><span class="shc-val">${myStats.pts}</span><span class="shc-lbl">Puntos</span></div>
        <div class="shc-stat"><span class="shc-val" style="color:var(--success)">${myStats.exact}</span><span class="shc-lbl">Exactos</span></div>
        <div class="shc-stat"><span class="shc-val" style="color:var(--warn)">${myStats.winner}</span><span class="shc-lbl">Ganador</span></div>
        <div class="shc-stat"><span class="shc-val" style="color:var(--danger)">${myStats.miss}</span><span class="shc-lbl">Fallidos</span></div>
        <div class="shc-stat"><span class="shc-val" style="color:var(--accent1)">${myStats.maxStreak}</span><span class="shc-lbl">Racha máx.</span></div>
        <div class="shc-stat"><span class="shc-val">${myStats.pct}%</span><span class="shc-lbl">Precisión</span></div>
      </div>
    </div>`;
  }

  const rows=stats.map((s,i)=>`<tr class="${isMe(s.uid)?'tr-me':''}">
    <td>${i+1}</td>
    <td>${s.name}${isMe(s.uid)?' 👤':''}</td>
    <td class="td-pts">${s.pts}</td>
    <td style="color:var(--success)">${s.exact}</td>
    <td style="color:var(--warn)">${s.winner}</td>
    <td style="color:var(--danger)">${s.miss}</td>
    <td style="color:var(--accent1)">${s.maxStreak} 🔥</td>
    <td>${s.pct}%</td>
  </tr>`).join("");

  main.innerHTML=`<div class="page-wrap">
    <h2 class="page-title">📈 Estadísticas</h2>
    ${myCard}
    <div class="card" style="overflow-x:auto">
      <table class="stats-table">
        <thead><tr><th>#</th><th>Nombre</th><th>Pts</th><th>Exactos</th><th>Ganador</th><th>Fallo</th><th>Racha</th><th>%</th></tr></thead>
        <tbody>${rows||`<tr><td colspan="8" class="td-empty">Sin datos aún</td></tr>`}</tbody>
      </table>
    </div>
  </div>`;
}

window.genCodes=async(qty)=>{

  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let n=0;
  for(let i=0;i<qty;i++){
    let c="";for(let j=0;j<6;j++) c+=chars[Math.floor(Math.random()*chars.length)];

  }

};

function getPDF(landscape=false){
  const {jsPDF}=window.jspdf;
  return new jsPDF({orientation:landscape?"landscape":"portrait",unit:"mm",format:"letter"});
}
function pdfHeader(doc,title,sub=""){
  doc.setFillColor(26,58,40);
  doc.rect(8,8,doc.internal.pageSize.width-16,12,"F");
  doc.setTextColor(201,168,76);
  doc.setFontSize(11);doc.setFont("helvetica","bold");
  doc.text(title,doc.internal.pageSize.width/2,16,{align:"center"});
  if(sub){doc.setFontSize(7);doc.setFont("helvetica","normal");doc.text(sub,doc.internal.pageSize.width/2,21,{align:"center"});}
  doc.setTextColor(0,0,0);
}
function savePDF(doc,name){
  doc.save(name);
  showToast("✅ PDF guardado","success");
}

window.printMisPronos=async()=>{
  showToast("Generando PDF...","info");
  const uSnap=await getDoc(doc(db,"users",currentUser.uid));
  const name=(uSnap.exists()?uSnap.data().displayName:"")||currentUser.email;
  const preds=window._myPreds||{};
  const matches=window._allMatchesPrint||allMatches;
  const groups=[...new Set(matches.filter(m=>m.phase==="groups").map(m=>m.group))].sort();
  const col1=groups.slice(0,6), col2=groups.slice(6);
  const pdf=getPDF(false);
  const W=pdf.internal.pageSize.width, H=pdf.internal.pageSize.height;
  pdfHeader(pdf,"QUINIELA MUNDIAL 2026 — Mis Pronósticos",`${name} | ${new Date().toLocaleDateString("es-GT")}`);
  const colW=(W-24)/2;
  function buildGroupRows(grps){
    const rows=[];
    for(const g of grps){
      matches.filter(m=>m.group===g).forEach((m,i)=>{
        const p=preds[m.id];
        rows.push([i===0?`G.${g}`:"",m.home,p?`${p.home}:${p.away}`:"?",m.away]);
      });
    }
    return rows;
  }
  pdf.autoTable({startY:26,margin:{left:8},tableWidth:colW,head:[["G","Local","","Visitante"]],body:buildGroupRows(col1),styles:{fontSize:6.5,cellPadding:1.2},headStyles:{fillColor:[26,58,40],textColor:[201,168,76],fontSize:7},columnStyles:{0:{cellWidth:8,fontStyle:"bold"},2:{cellWidth:12,halign:"center",fillColor:[245,245,245]},1:{halign:"right"},3:{halign:"left"}}});
  pdf.autoTable({startY:26,margin:{left:16+colW},tableWidth:colW,head:[["G","Local","","Visitante"]],body:buildGroupRows(col2),styles:{fontSize:6.5,cellPadding:1.2},headStyles:{fillColor:[26,58,40],textColor:[201,168,76],fontSize:7},columnStyles:{0:{cellWidth:8,fontStyle:"bold"},2:{cellWidth:12,halign:"center",fillColor:[245,245,245]},1:{halign:"right"},3:{halign:"left"}}});
  savePDF(pdf,`pronos_${name.replace(/\s+/g,"_")}.pdf`);
};

window.printTodosPronos=async()=>{
  showToast("Generando PDF... puede tardar un momento","info");
  const matchSnap=await getDocs(collection(db,"matches"));
  const matches=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date));
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={}; usersSnap.forEach(d=>{uMap[d.id]=d.data();});
  const all=[]; predsSnap.forEach(d=>{if(uMap[d.id]&&uMap[d.id].email!==ADMIN_EMAIL&&uMap[d.id].email!==ADMIN2_EMAIL) all.push({user:uMap[d.id],preds:d.data().preds||{}});});
  all.sort((a,b)=>(a.user.displayName||"").localeCompare(b.user.displayName||""));
  const groups=[...new Set(matches.filter(m=>m.phase==="groups").map(m=>m.group))].sort();
  const col1G=groups.slice(0,6), col2G=groups.slice(6);
  const pdf=getPDF(false);
  const W=pdf.internal.pageSize.width;
  const colW=(W-24)/2;
  all.forEach((entry,idx)=>{
    if(idx>0) pdf.addPage();
    const u=entry.user;
    pdfHeader(pdf,"QUINIELA MUNDIAL 2026",`${u.displayName||u.name} | ${u.phone||u.email}`);
    function buildRows(grps){
      const rows=[];
      for(const g of grps){
        matches.filter(m=>m.group===g).forEach((m,i)=>{
          const p=entry.preds[m.id];
          rows.push([i===0?`G.${g}`:"",m.home,p?`${p.home}:${p.away}`:"?",m.away]);
        });
      }
      return rows;
    }
    pdf.autoTable({startY:26,margin:{left:8},tableWidth:colW,head:[["G","Local","","Visitante"]],body:buildRows(col1G),styles:{fontSize:6.5,cellPadding:1.2},headStyles:{fillColor:[26,58,40],textColor:[201,168,76],fontSize:7},columnStyles:{0:{cellWidth:8,fontStyle:"bold"},2:{cellWidth:12,halign:"center",fillColor:[245,245,245]},1:{halign:"right"}}});
    pdf.autoTable({startY:26,margin:{left:16+colW},tableWidth:colW,head:[["G","Local","","Visitante"]],body:buildRows(col2G),styles:{fontSize:6.5,cellPadding:1.2},headStyles:{fillColor:[26,58,40],textColor:[201,168,76],fontSize:7},columnStyles:{0:{cellWidth:8,fontStyle:"bold"},2:{cellWidth:12,halign:"center",fillColor:[245,245,245]},1:{halign:"right"}}});
  });
  savePDF(pdf,`todos_pronosticos_${new Date().toLocaleDateString("es-GT").replace(/\//g,"-")}.pdf`);
};

window.printResultados=async()=>{
  showToast("Generando PDF...","info");
  const matchSnap=await getDocs(collection(db,"matches"));
  const matches=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const predsSnap=await getDocs(collection(db,"predictions"));
  const usersSnap=await getDocs(collection(db,"users"));
  const uMap={}; usersSnap.forEach(d=>{uMap[d.id]=d.data();});
  const offMap={}; matches.forEach(m=>{if(m.official&&m.official.home!==null&&m.official.home!==undefined) offMap[m.id]=m.official;});
  const lb=[];
  predsSnap.forEach(d=>{
    const uid=d.id,preds=d.data().preds||{};
    if(!uMap[uid]||uMap[uid].email===ADMIN_EMAIL||uMap[uid].email===ADMIN2_EMAIL) return;
    let pts=0,exact=0,win=0;
    matches.forEach(m=>{
      const off=offMap[m.id],pred=preds[m.id];
      if(!off||!pred) return;
      const p=calcPoints(pred,off);
      if(p===3){pts+=3;exact++;}else if(p===1){pts+=1;win++;}
    });
    lb.push({uid,name:uMap[uid].displayName||uMap[uid].name||uid,pts,exact,win});
  });
  lb.sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
  const pdf=getPDF(false);
  pdfHeader(pdf,"QUINIELA MUNDIAL 2026 — Resultados",`${lb.length} participantes | ${matches.filter(m=>m.official).length} partidos jugados`);
  const body=lb.map((r,i)=>[i+1,r.name,r.pts,r.exact,r.win,r.pts-r.exact-r.win<0?0:r.pts-(r.exact*3)-(r.win)]);
  pdf.autoTable({startY:26,head:[["#","Participante","Pts","3pts","1pt","0pts"]],body,styles:{fontSize:8,cellPadding:1.5},headStyles:{fillColor:[26,58,40],textColor:[201,168,76]},columnStyles:{0:{cellWidth:10,halign:"center"},2:{cellWidth:14,halign:"center",fontStyle:"bold"},3:{cellWidth:14,halign:"center"},4:{cellWidth:14,halign:"center"},5:{cellWidth:14,halign:"center"}},didParseCell:(d)=>{if(d.row.index<3&&d.section==="body") d.cell.styles.fillColor=d.row.index===0?[255,248,220]:d.row.index===1?[240,240,240]:[253,243,231];}});
  savePDF(pdf,`resultados_quiniela2026.pdf`);
};

.gate-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 50% 20%,rgba(42,107,74,0.2) 0%,transparent 55%),var(--bg)}

.gate-box h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:.5rem;color:var(--text)}

.gate-inp{text-align:center;letter-spacing:5px;font-size:1.2rem;font-weight:700;font-family:'Syne',sans-serif}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;background:rgba(11,22,18,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.1);position:sticky;top:0;z-index:100}

.topbar-menu{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent1));border:1px solid rgba(201,168,76,0.3);cursor:pointer;font-size:1rem;font-weight:800;color:var(--c1);display:flex;align-items:center;justify-content:center;transition:.2s}
.topbar-menu:hover{border-color:var(--c1);box-shadow:0 0 12px rgba(201,168,76,0.2)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:199;display:none;backdrop-filter:blur(6px)}
.sidebar-overlay.show{display:block}
.sidebar{position:fixed;top:0;right:-290px;width:290px;height:100vh;background:linear-gradient(180deg,#0f1e18 0%,#0b1612 100%);border-left:1px solid rgba(201,168,76,0.1);z-index:200;transition:.35s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;padding:1.5rem 1.1rem;overflow-y:auto}
.sidebar.open{right:0}
.sidebar-profile{display:flex;align-items:center;gap:.875rem;padding-bottom:1.25rem;margin-bottom:1rem;border-bottom:1px solid rgba(201,168,76,0.1)}
.sidebar-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent1));border:2px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:var(--c1);font-size:1.1rem;flex-shrink:0}
.sidebar-uname{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;color:var(--text)}
.sidebar-uemail{color:var(--muted);font-size:.75rem;margin-top:.1rem;word-break:break-all}
.sidebar-links{flex:1;display:flex;flex-direction:column;gap:.2rem}
.slink{display:block;width:100%;text-align:left;padding:.7rem .9rem;border:none;border-radius:10px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;transition:.15s;text-decoration:none}

.wa-slink{color:#25d366!important}.admin-slink{color:var(--c1)!important}.admin2-slink{color:#a78bfa!important}
.logout-slink{color:var(--danger)!important;margin-top:.5rem;border-top:1px solid rgba(201,168,76,0.1);padding-top:1rem}
.slink-group-label{font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:.6rem .9rem .2rem;font-weight:600}
/* FASE BLOQUEADA */
.phase-locked-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 2rem;min-height:50vh}

.pls-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--muted);margin-bottom:.75rem}

main{padding:1.5rem 1rem;max-width:960px;margin:0 auto}
main.full{max-width:100%;padding:0}
.page-wrap{display:flex;flex-direction:column;gap:1.25rem;animation:fadeUp .3s ease}

.page-header{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.page-title{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:var(--c1);letter-spacing:-.3px}
.btn-back{padding:.45rem .9rem;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:8px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.88rem;transition:.2s}
.btn-back:hover{border-color:var(--c1);color:var(--c1)}
.btn-icon{width:36px;height:36px;border-radius:9px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);cursor:pointer;font-size:.95rem;color:var(--text2);transition:.2s}
.btn-icon:hover{border-color:var(--c1);color:var(--c1)}
.btn-sm{padding:.45rem .9rem;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:8px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.83rem;transition:.2s;white-space:nowrap}
.btn-sm:hover{background:rgba(255,255,255,0.07);color:var(--text)}
.btn-sm.btn-ok{border-color:rgba(46,158,91,.35);color:var(--success)}.btn-sm.btn-danger{border-color:rgba(192,57,43,.35);color:var(--danger)}
.btn-xs{padding:.28rem .55rem;border-radius:6px;border:1px solid var(--border2);background:rgba(255,255,255,0.04);color:var(--text2);cursor:pointer;font-size:.78rem;transition:.15s}
.btn-xs:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.btn-xs.btn-ok{border-color:rgba(46,158,91,.35);color:var(--success)}.btn-xs.btn-danger{border-color:rgba(192,57,43,.35);color:var(--danger)}.btn-xs.btn-warn{border-color:rgba(201,168,76,.3);color:var(--warn)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.card-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--c1);margin-bottom:.75rem}
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0}
.center-card{text-align:center;padding:3rem 2rem}
.hero-card{background:linear-gradient(135deg,#0d2018 0%,#0f2a1c 50%,#0a1e13 100%);border:1px solid rgba(201,168,76,0.15);border-radius:20px;padding:2.5rem 2rem;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.4),transparent)}
.hero-bg-text{position:absolute;right:-15px;bottom:-25px;font-family:'Syne',sans-serif;font-size:9rem;font-weight:900;color:rgba(255,255,255,0.025);line-height:1;pointer-events:none;user-select:none}
.hero-content{position:relative;z-index:1}
.hero-sub{color:var(--muted);font-size:.78rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:.3rem;font-weight:300}
.hero-name{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--text);margin-bottom:.25rem}
.hero-tagline{color:var(--muted);margin-bottom:1.5rem;font-size:.9rem;font-style:italic}
.hero-btns{display:flex;gap:.75rem;flex-wrap:wrap}
.hero-btns .btn-main{width:auto;padding:.7rem 1.5rem}
.ann-bar{background:linear-gradient(90deg,rgba(201,168,76,0.12),rgba(201,168,76,0.08));border:1px solid rgba(201,168,76,0.2);color:var(--c2);padding:.6rem 1rem;border-radius:10px;font-weight:500;font-size:.88rem;text-align:center}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem}
.quick-btn{padding:.75rem;background:var(--card2);border:1px solid rgba(201,168,76,0.2);border-radius:10px;color:var(--c2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.88rem;transition:.2s}
.quick-btn:hover{background:rgba(201,168,76,0.1);border-color:var(--c1)}
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem}
.photo-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.photo-card img{width:100%;height:130px;object-fit:cover}
.photo-card p{padding:.4rem .6rem;font-size:.78rem;color:var(--muted)}
.photos-mini{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem}
.photo-mini-item{position:relative;display:inline-block}
.photo-mini-item img{height:50px;border-radius:6px;object-fit:cover}
.photo-mini-item button{position:absolute;top:-4px;right:-4px;background:var(--danger);border:none;border-radius:50%;width:16px;height:16px;color:white;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.phases-list{display:flex;flex-direction:column;gap:.5rem}
.phase-card{display:flex;align-items:center;gap:1rem;background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:.9rem 1.1rem;transition:.2s}
.phase-card:not(.phase-locked):hover{border-color:rgba(201,168,76,0.25);background:var(--card2);transform:translateX(3px)}
.phase-locked{opacity:.4;filter:grayscale(.3)}.phase-done{border-color:rgba(46,158,91,.25);background:rgba(46,158,91,.03)}.phase-partial{border-color:rgba(201,168,76,.2)}
.phase-icon{font-size:1.4rem;width:38px;text-align:center}
.phase-info{flex:1}
.phase-label{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--text)}
.phase-progress{color:var(--muted);font-size:.78rem;margin-top:.1rem}
.phase-arrow{color:var(--c1);font-size:1.3rem}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:.6rem}
.group-tile{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:.9rem;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:.3rem}
.group-tile:hover{border-color:rgba(201,168,76,0.3);background:var(--card2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.group-tile-done{border-color:rgba(46,158,91,.3);background:rgba(46,158,91,.03)}.group-tile-partial{border-color:rgba(201,168,76,.2)}
.gt-label{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--c1)}.gt-count{font-size:.75rem;color:var(--muted)}
.matches-v2{display:flex;flex-direction:column;gap:.5rem}
.match-card-v2{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:.9rem;transition:.2s}

.mc-elim-label{font-size:.7rem;color:var(--c1);font-family:'Syne',sans-serif;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:.4rem}

/* MODAL PENALES */

.penal-score-sel{width:100%;padding:.65rem 1rem;border-radius:10px;border:1px solid var(--border);background:#1a2e20;color:var(--text);font-size:1.1rem;text-align:center;font-family:'Syne',sans-serif;font-weight:700}

.pen-chip{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--c1);font-size:.75rem;padding:.2rem .6rem;border-radius:20px;white-space:nowrap}

.pen-winner-badge{background:rgba(201,168,76,.15);color:var(--c1);font-size:.72rem;padding:.1rem .4rem;border-radius:6px;margin-left:.3rem}

.mc-vs{color:var(--muted);font-size:.75rem;font-weight:300;font-style:italic}.mc-date{color:var(--muted);font-size:.75rem;margin:.35rem 0;font-weight:300}
.score-inputs{display:flex;align-items:center;gap:.5rem}

.sinp-sep{color:var(--muted);font-size:1rem;font-weight:700}.sinp-sm{width:42px;padding:.3rem;font-size:.9rem}
.pred-result{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.pred-score-v2{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--text)}
.pts-badge{padding:.22rem .55rem;border-radius:20px;font-size:.75rem;font-weight:700;font-family:'Syne',sans-serif}
.pts-badge.pts-3{background:rgba(46,158,91,.12);color:var(--success);border:1px solid rgba(46,158,91,.25)}
.pts-badge.pts-1{background:rgba(201,168,76,.12);color:var(--warn);border:1px solid rgba(201,168,76,.25)}
.pts-badge.pts-0{background:rgba(192,57,43,.08);color:var(--danger);border:1px solid rgba(192,57,43,.18)}
.off-score{color:var(--muted);font-size:.78rem;font-style:italic}.locked-badge{color:var(--muted);font-size:.85rem;padding:.35rem 0;font-style:italic}
.btn-save-all{width:100%;padding:.9rem;background:linear-gradient(135deg,#1a4a32,#2a6b4a);border:1px solid rgba(201,168,76,0.25);border-radius:12px;color:var(--c1);font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;margin-top:.5rem;transition:.25s;letter-spacing:.5px}
.btn-save-all:hover{filter:brightness(1.15);transform:translateY(-1px);box-shadow:0 4px 16px rgba(42,107,74,.35)}
.tabla-wrap{padding:1rem}
.tabla-header{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:.75rem}
.tabla-tabs{display:flex;gap:.5rem;margin-bottom:1rem;background:rgba(255,255,255,0.04);padding:.35rem;border-radius:12px;width:fit-content}
.ttab{padding:.55rem 1.25rem;border:none;border-radius:9px;background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:.2s;letter-spacing:.3px}
.ttab.active{background:linear-gradient(135deg,var(--accent2),var(--accent1));color:var(--c1);border:1px solid rgba(201,168,76,0.25)}
.tabla-card{margin-bottom:1.5rem}
.tabla-card-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--c1);margin-bottom:.6rem;padding:.5rem .75rem;background:rgba(201,168,76,0.06);border-radius:8px;border-left:3px solid var(--c1)}
.tabla-legend{display:flex;gap:.75rem;font-size:.78rem;color:var(--muted);flex-wrap:wrap}
